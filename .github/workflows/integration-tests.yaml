name: integration-tests

# ---------------------------------------------------------------------------
# Triggered by commits in upstream dependant repos (deeptools, flex, torch-spyre etc.) via
# workflow_dispatch.  Runs the full test matrix against a specified
# hf-adapters ref so regressions from upstream changes are caught early.
#
# Example caller pattern from an upstream repo's workflow:
#
#   gh workflow run integration-tests.yaml \
#     --repo <org>/hf-adapters \
#     -f triggering_repo=<repo link to deeptools/flex> \
#     -f triggering_sha=${{ github.sha }} \
#     -f pr_url_hash=$(echo -n "${{ github.event.pull_request.html_url }}" | sha256sum | cut -c1-16)
# ---------------------------------------------------------------------------
on:
  # TODO(remove before merge): pull_request trigger added temporarily to
  # exercise the new `models` filter (below) end-to-end via _test_matrix.yaml
  # on this branch's PR.
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      # ---- Upstream provenance ----------------
      triggering_repo:
        description: Name of the upstream repo that triggered this run (e.g. "deeptools", "flex", "torch-spyre")
        required: false
        type: string
        default: ''
      triggering_sha:
        description: Commit SHA in the upstream repo that triggered this run
        required: false
        type: string
        default: ''
      pr_url_hash:
        description: |
          Hash of the full URL of the upstream PR that triggered this run.
          Used to key the concurrency group so that re-runs for the same PR
          cancel any in-flight run. Leave empty for non-PR triggers.
        required: false
        type: string
        default: ''

      # ---- hf-adapters ref to test ----------
      ref:
        description: Branch, tag, or SHA of hf-adapters to check out and test
        required: false
        type: string
        default: ''
      repository:
        description: Full clone URL of a hf-adapters fork (e.g. "https://github.com/myuser/hf-adapters.git"); leave empty for the base repo
        required: false
        type: string
        default: ''

      # ---- image overrides ------------------
      runner_label:
        description: |
          Per-PR ephemeral runner-set IMAGE label
          (image_torch_spyre_pinned_pr_<component>_<sha12>).
          Leave empty to use the standing image_torch_spyre_pinned set.
        required: false
        type: string
        default: ''
      test_type:
        description: >-
          Which Spyre suites to run in _test_matrix.yaml: "full" (default,
          everything) or a space-separated allowlist of suite keys (load,
          smoke, token_compare, embed_compare, vlm, model_module), e.g.
          "smoke" or "smoke token_compare".
        required: false
        type: string
        default: full
      models:
        description: >-
          Space-separated list of model paths to restrict every matrix job
          (smoke/load/token-compare/embed-compare/vision) to, e.g.
          "Qwen/Qwen3-0.6B ministral/Ministral-3B-Instruct". Must match paths
          exactly as they appear in tests/model_registry.py. Empty (default)
          = run every model in the registry.
        required: false
        type: string
        default: ''

concurrency:
  group: ${{ github.workflow }}-${{ (github.event_name == 'pull_request' && github.event.pull_request.html_url) || (github.event_name == 'workflow_dispatch'
    && inputs.pr_url_hash != '' && inputs.pr_url_hash) || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write

jobs:
  # ---------------------------------------------------------------------------
  # Print a summary of what triggered this run so it is tracked
  # ---------------------------------------------------------------------------
  provenance:
    name: Log upstream dependant tool regression trigger
    runs-on: ubuntu-latest
    steps:
      - name: Show trigger info
        run: |
          {
            echo "## Integration test triggered by upstream change"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Upstream repo   | ${{ inputs.triggering_repo || '(not specified)' }} |"
            echo "| Upstream commit | ${{ inputs.triggering_sha || '(not specified)' }} |"
            echo "| PR URL hash     | ${{ inputs.pr_url_hash || '(not specified)' }} |"
            echo "| hf-adapters ref | ${{ inputs.ref || github.sha }} |"
          } >> "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------------------
  # Run the full test matrix currently same as "run-tests" job in
  # torch_spyre_tests.yaml. The `models` input (see workflow_dispatch inputs
  # above) restricts every matrix job in _test_matrix.yaml to a caller-chosen
  # model subset instead of running the full registry.
  # ---------------------------------------------------------------------------
  run-tests:
    needs: provenance
    uses: ./.github/workflows/_test_matrix.yaml
    with:
      image_label: ${{ inputs.runner_label || 'image_torch_spyre_pinned' }}
      extra_test_flags: -vvv -s
      extra_test_flags_multi_spyre: -vvv -s
      ref: ${{ inputs.ref || '' }}
      repository: ${{ inputs.repository || '' }}
      # TODO(remove before merge): pull_request fallbacks exercise the
      # test_type/models filters on this branch's PR (workflow_dispatch inputs
      # aren't set for pull_request events, so inputs.test_type/models are
      # empty there). Restricts the PR run to just the smoke suite key on the
      # 3 requested models instead of the full matrix.
      test_type: ${{ inputs.test_type || (github.event_name == 'pull_request' && 'smoke') || 'full' }}
      models: ${{ inputs.models || (github.event_name == 'pull_request' && 'Qwen/Qwen3-0.6B ministral/Ministral-3B-Instruct ibm-granite/granite-4.0-1b-base') || '' }}

  # ----------------------------------------------------------------------------------
  # Fan-in gate job so callers can poll a single stable job name for pass/fail.
  # ----------------------------------------------------------------------------------
  integration-test-result:
    name: Integration test result
    runs-on: ubuntu-latest
    needs: run-tests
    if: always()
    steps:
      - name: Evaluate test results
        run: |
          RESULT="${{ needs.run-tests.result }}"
          echo "run-tests result: ${RESULT}"

          if [[ "${RESULT}" == "success" ]]; then
            echo "All integration test suites passed."
            exit 0
          fi

          echo "One or more integration test suites failed or were cancelled."
          exit 1
