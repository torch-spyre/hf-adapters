name: integration-tests

# ---------------------------------------------------------------------------
# Triggered by commits in upstream dependant repos (deeptools, flex, torch-spyre etc.) via
# workflow_dispatch.  Runs the full test matrix against a specified
# hf-adapters ref so regressions from upstream changes are caught early.
#
# Example caller pattern from an upstream repo's workflow:
#
#   gh workflow run integration-tests.yaml \
#     --repo <org>/hf-adapters \
#     -f triggering_repo=<repo link to deeptools/flex> \
#     -f triggering_sha=${{ github.sha }} \
#     -f pr_url_hash=$(echo -n "${{ github.event.pull_request.html_url }}" | sha256sum | cut -c1-16)
# ---------------------------------------------------------------------------
on:
  # TODO(remove before merge): pull_request trigger added temporarily to test
  # the spyre-smoke-subset-tests job on this branch's PR.
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      # ---- Upstream provenance ----------------
      triggering_repo:
        description: Name of the upstream repo that triggered this run (e.g. "deeptools", "flex", "torch-spyre")
        required: false
        type: string
        default: ''
      triggering_sha:
        description: Commit SHA in the upstream repo that triggered this run
        required: false
        type: string
        default: ''
      pr_url_hash:
        description: |
          Hash of the full URL of the upstream PR that triggered this run.
          Used to key the concurrency group so that re-runs for the same PR
          cancel any in-flight run. Leave empty for non-PR triggers.
        required: false
        type: string
        default: ''

      # ---- hf-adapters ref to test ----------
      ref:
        description: Branch, tag, or SHA of hf-adapters to check out and test
        required: false
        type: string
        default: ''
      repository:
        description: Full clone URL of a hf-adapters fork (e.g. "https://github.com/myuser/hf-adapters.git"); leave empty for the base repo
        required: false
        type: string
        default: ''

      # ---- image overrides ------------------
      runner_label:
        description: |
          Per-PR ephemeral runner-set IMAGE label
          (image_torch_spyre_pinned_pr_<component>_<sha12>).
          Leave empty to use the standing image_torch_spyre_pinned set.
        required: false
        type: string
        default: ''
      test_type:
        description: >-
          Suite subset to run: smoke | core | full | suite_<group> | <label>.
          Default: full (every config).
        required: false
        type: string
        default: full

concurrency:
  group: ${{ github.workflow }}-${{ (github.event_name == 'pull_request' && github.event.pull_request.html_url) || (github.event_name == 'workflow_dispatch'
    && inputs.pr_url_hash != '' && inputs.pr_url_hash) || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write

jobs:
  # ---------------------------------------------------------------------------
  # Print a summary of what triggered this run so it is tracked
  # ---------------------------------------------------------------------------
  provenance:
    name: Log upstream dependant tool regression trigger
    runs-on: ubuntu-latest
    steps:
      - name: Show trigger info
        run: |
          {
            echo "## Integration test triggered by upstream change"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Upstream repo   | ${{ inputs.triggering_repo || '(not specified)' }} |"
            echo "| Upstream commit | ${{ inputs.triggering_sha || '(not specified)' }} |"
            echo "| PR URL hash     | ${{ inputs.pr_url_hash || '(not specified)' }} |"
            echo "| hf-adapters ref | ${{ inputs.ref || github.sha }} |"
          } >> "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------------------
  # Run the full test matrix currently same as "run-tests" job in
  # torch_spyre_tests.yaml
  # ---------------------------------------------------------------------------
  run-tests:
    needs: provenance
    # Skip the full matrix on pull_request events (see the temporary
    # pull_request trigger above) -- PRs only need spyre-smoke-subset-tests.
    # workflow_dispatch (the normal upstream-triggered path) still runs it.
    if: github.event_name != 'pull_request'
    uses: ./.github/workflows/_test_matrix.yaml
    with:
      image_label: ${{ inputs.runner_label || 'image_torch_spyre_pinned' }}
      extra_test_flags: -vvv -s
      extra_test_flags_multi_spyre: -vvv -s
      ref: ${{ inputs.ref || '' }}
      repository: ${{ inputs.repository || '' }}
      test_type: ${{ inputs.test_type || 'full' }}

  # ---------------------------------------------------------------------------
  # Fixed 3-model smoke subset (Qwen3, Ministral, Granite 4.0) run directly in
  # this workflow, independent of the dynamic matrix in _test_matrix.yaml.
  # Hardcoded on purpose: this is a small fast sanity check, not meant to grow
  # with the model registry.
  # ---------------------------------------------------------------------------
  spyre-smoke-subset-tests:
    name: Spyre smoke subset (${{ matrix.model_key }})
    needs: provenance
    runs-on:
      - x86_64
      - spyre_pf_x1
      - linux
      - ${{ inputs.runner_label || 'image_torch_spyre_pinned' }}
    timeout-minutes: 120
    env:
      CI: ""
      CLONED_HF_ADAPTERS_DIR: ${{ github.workspace }}
    defaults:
      run:
        shell: bash
        working-directory: /home/senuser
    strategy:
      fail-fast: false
      matrix:
        model_key:
          # test_e2e_smoke_spyre.py parametrizes on model_path (not the
          # model_registry.py dict key), and -k matches that string --
          # these must be the full HF paths, not registry keys like "qwen3".
          - Qwen/Qwen3-0.6B
          - ministral/Ministral-3B-Instruct
          - ibm-granite/granite-4.0-1b-base

    steps:
      - name: Checkout composite actions
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: .github/actions
          sparse-checkout-cone-mode: false

      - uses: ./.github/actions/build-hf-adapters
        with:
          uv_groups: "dev spyre test"
          ref: ${{ inputs.ref }}
          repository: ${{ inputs.repository }}

      - name: Gather runner info
        uses: ./.github/actions/gather-runner-info
        with:
          verbose: 'true'

      - name: Run test_e2e_smoke_spyre.py for ${{ matrix.model_key }}
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          source "$HOME/.bashrc"
          source /etc/profile.d/ibm-aiu-setup.sh
          cd "$CLONED_HF_ADAPTERS_DIR"
          echo "Running test_e2e_smoke_spyre.py for ${{ matrix.model_key }}..."
          uv run pytest -vvv -s tests/spyre/test_e2e_smoke_spyre.py -k "${{ matrix.model_key }}"
          echo "tests done"

  # ----------------------------------------------------------------------------------
  # Fan-in gate job so callers can poll a single stable job name for pass/fail.
  # ----------------------------------------------------------------------------------
  integration-test-result:
    name: Integration test result
    runs-on: ubuntu-latest
    needs: [run-tests, spyre-smoke-subset-tests]
    if: always()
    steps:
      - name: Evaluate test results
        run: |
          RESULT="${{ needs.run-tests.result }}"
          SUBSET_RESULT="${{ needs.spyre-smoke-subset-tests.result }}"
          echo "run-tests result: ${RESULT}"
          echo "spyre-smoke-subset-tests result: ${SUBSET_RESULT}"

          if [[ ( "${RESULT}" == "success" || "${RESULT}" == "skipped" ) && "${SUBSET_RESULT}" == "success" ]]; then
            echo "All integration test suites passed."
            exit 0
          fi

          echo "One or more integration test suites failed or were cancelled."
          exit 1
