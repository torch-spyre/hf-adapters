name: integration-tests

# ---------------------------------------------------------------------------
# Triggered by commits in upstream dependant repos (deeptools, flex, torch-spyre etc.) via
# workflow_dispatch. Runs the smoke suite (test_type default) against a
# specified hf-adapters ref so regressions from upstream changes are caught
# early without paying for the full matrix on every upstream commit; pass
# test_type/models explicitly for a broader check.
#
# Example caller pattern from an upstream repo's workflow:
#
#   gh workflow run integration-tests.yaml \
#     --repo <org>/hf-adapters \
#     -f triggering_repo=<repo link to deeptools/flex> \
#     -f triggering_sha=${{ github.sha }} \
#     -f pr_url_hash=$(echo -n "${{ github.event.pull_request.html_url }}" | sha256sum | cut -c1-16)
# ---------------------------------------------------------------------------
on:
  workflow_dispatch:
    inputs:
      # ---- Upstream provenance ----------------
      triggering_repo:
        description: Name of the upstream repo that triggered this run (e.g. "deeptools", "flex", "torch-spyre")
        required: false
        type: string
        default: ''
      triggering_sha:
        description: Commit SHA in the upstream repo that triggered this run
        required: false
        type: string
        default: ''
      pr_url_hash:
        description: |
          Hash of the full URL of the upstream PR that triggered this run.
          Used to key the concurrency group so that re-runs for the same PR
          cancel any in-flight run. Leave empty for non-PR triggers.
        required: false
        type: string
        default: ''

      # ---- hf-adapters ref to test ----------
      ref:
        description: Branch, tag, or SHA of hf-adapters to check out and test
        required: false
        type: string
        default: ''
      repository:
        description: Full clone URL of a hf-adapters fork (e.g. "https://github.com/myuser/hf-adapters.git"); leave empty for the base repo
        required: false
        type: string
        default: ''

      # ---- image overrides ------------------
      runner_label:
        description: |
          Per-PR ephemeral runner-set IMAGE label
          (image_torch_spyre_pinned_pr_<component>_<sha12>).
          Leave empty to use the standing image_torch_spyre set.
        required: false
        type: string
        default: ''
      test_type:
        description: >-
          Test tier to run: smoke | core | full. "smoke" runs only the smoke
          suite; "core" runs every other suite (load, token_compare,
          embed_compare, vlm, model_module); "full" runs everything. This is
          a plain string underneath (see _test_matrix.yaml), so a caller
          using the API/gh CLI can also pass an individual suite key or a
          space-separated combo (e.g. "smoke token_compare") for finer
          control than the dropdown offers.
        required: false
        type: choice
        default: smoke
        options:
          - smoke
          - core
          - full
      models:
        description: >-
          Space-separated list of model paths to restrict every matrix job
          (smoke/load/token-compare/embed-compare/vision) to, e.g.
          "Qwen/Qwen3-0.6B ministral/Ministral-3B-Instruct". Must match paths
          exactly as they appear in tests/model_registry.py. Leave empty
          (default) to fall back to a fixed 3-model spot-check -- see
          run-tests below.
        required: false
        type: string
        default: 'Qwen/Qwen3-0.6B ministral/Ministral-3B-Instruct ibm-granite/granite-4.0-1b-base'

concurrency:
  group: ${{ github.workflow }}-${{ (github.event_name == 'pull_request' && github.event.pull_request.html_url) || (github.event_name == 'workflow_dispatch'
    && inputs.pr_url_hash != '' && inputs.pr_url_hash) || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write

jobs:
  # ---------------------------------------------------------------------------
  # Print a summary of what triggered this run so it is tracked
  # ---------------------------------------------------------------------------
  provenance:
    name: Log upstream dependant tool regression trigger
    runs-on: ubuntu-latest
    steps:
      - name: Show trigger info
        run: |
          {
            echo "## Integration test triggered by upstream change"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Upstream repo   | ${{ inputs.triggering_repo || '(not specified)' }} |"
            echo "| Upstream commit | ${{ inputs.triggering_sha || '(not specified)' }} |"
            echo "| PR URL hash     | ${{ inputs.pr_url_hash || '(not specified)' }} |"
            echo "| hf-adapters ref | ${{ inputs.ref || github.sha }} |"
          } >> "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------------------
  # Delegates to the same reusable _test_matrix.yaml used by "run-tests" in
  # torch_spyre_tests.yaml. `test_type` defaults to "smoke" and, if `models`
  # is left empty, falls back to a fixed 3-model spot-check (Qwen3-0.6B,
  # Ministral-3B-Instruct, granite-4.0-1b-base) -- so upstream-triggered runs
  # stay fast by default. Pass test_type: full and/or an explicit models
  # value for full coverage.
  # ---------------------------------------------------------------------------
  run-tests:
    needs: provenance
    uses: ./.github/workflows/_test_matrix.yaml
    with:
      image_label: ${{ inputs.runner_label || 'image_torch_spyre' }}
      extra_test_flags: -vvv -s
      extra_test_flags_multi_spyre: -vvv -s
      ref: ${{ inputs.ref || '' }}
      repository: ${{ inputs.repository || '' }}
      test_type: ${{ inputs.test_type || 'smoke' }}
      models: ${{ inputs.models || 'Qwen/Qwen3-0.6B ministral/Ministral-3B-Instruct ibm-granite/granite-4.0-1b-base' }}

  # ----------------------------------------------------------------------------------
  # Fan-in gate job so callers can poll a single stable job name for pass/fail.
  # ----------------------------------------------------------------------------------
  integration-test-result:
    name: Integration test result
    runs-on: ubuntu-latest
    needs: run-tests
    if: always()
    steps:
      - name: Evaluate test results
        run: |
          RESULT="${{ needs.run-tests.result }}"
          echo "run-tests result: ${RESULT}"

          if [[ "${RESULT}" == "success" ]]; then
            echo "All integration test suites passed."
            exit 0
          fi

          echo "One or more integration test suites failed or were cancelled."
          exit 1
