# =============================================================================
# Reusable workflow: shared CPU + Spyre test matrices
#
# Called by test_pull_request.yaml (and, in a follow-up, daily_test.yaml).
# Triggers (push/schedule/etc.) and any caller-only jobs (e.g. pre-commit, the
# branch-protection fan-in gate) live in the caller. Everything below is the
# part PR and daily share verbatim — the matrix jobs over the model registry.
#
# Inputs cover the few axes that legitimately differ between callers:
#   - models_filter / pytest_marker: CPU `-k` and `-m` selection.
#   - torch_spyre_ref / rpm_location / rpm_names: passthrough to the build
#     composite action; usually empty unless workflow_dispatch sets them.
#
# Secrets are declared explicitly so callers can `secrets: inherit`.
# =============================================================================
name: _spyre_tests

on:
  workflow_call:
    inputs:
      models_filter:
        description: pytest `-k` filter for CPU tests
        required: true
        type: string
      pytest_marker:
        description: pytest `-m` marker filter for CPU tests (empty disables the flag)
        required: false
        type: string
        default: ""
      run_generate_edge_cases:
        description: Run the slow Spyre generate-edge-cases matrix (daily/weekly only)
        required: false
        type: boolean
        default: false
      torch_spyre_ref:
        description: Branch, tag, or SHA of torch-spyre to check out and test
        required: false
        type: string
        default: ""
      rpm_location:
        description: The Artifactory location where to download the RPM from
        required: false
        type: string
        default: ""
      rpm_names:
        description: A space separated list of RPM names to download and install
        required: false
        type: string
        default: ""
    secrets:
      ARTIFACTORY_USER:
        required: false
      ARTIFACTORY_API_KEY:
        required: false
      ARTIFACTORY_BASE_URL:
        required: false
      ARTIFACTORY_RPM_PATH:
        required: false
      HF_TOKEN:
        required: false

defaults:
  run:
    shell: bash
    working-directory: /home/senuser

permissions:
  contents: read
  checks: write

env:
  # The CI env var is very important.
  # GitHub actions automatically sets CI=true
  # which causes the pytest inductor tests to fail with AssertionError
  # due to a mix of fallbacks and decompositions.
  # Here we set it to an empty string (or we could also unset it).
  CI: ""
  CLONED_HF_ADAPTERS_DIR: ${{ github.workspace }}
  STORAGE_1_DIR: /storage-1/hf-adapters
  HF_HOME: /storage-1/hf-adapters/.cache/huggingface
  MODELS_FILTER: ${{ inputs.models_filter }}
  PYTEST_MARKER: ${{ inputs.pytest_marker }}

