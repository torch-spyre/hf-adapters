name: test_pull_request

on:
  push:
    branches: [main]
    tags: ["*"]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  merge_group:
    types: [checks_requested]
  workflow_dispatch:
    inputs:
      torch_spyre_ref:
        description: Branch, tag, or SHA of torch-spyre to check out and test
        required: false
        type: string
        default: ""
      rpm_location:
        description: The Artifactory location where to download the RPM from
        required: false
        type: string
        default: ""
      rpm_names:
        description: A space separated list of RPM names to download and install
        required: false
        type: string
        default: ""
      ref:
        description: Branch, tag, or SHA of hf-adapters to check out and test
        required: false
        type: string
        default: ""
      repository:
        description: |
          Full clone URL of the hf-adapters fork to check out (e.g.
          "https://github.com/myuser/hf-adapters.git"); leave empty for the base repo.
          Used by the cross-repo Test-With: flow to test a companion fork/branch.
        required: false
        type: string
        default: ""
      pr_url_hash:
        description: |
          Hash of the full URL of the PR that triggered this run.
          Sent by the internal integration pipeline; unused on push/PR/merge_group.
        required: false
        type: string
        default: ""
      build_torch_spyre:
        description: Accepted for dispatch-contract parity with torch-spyre; unused here.
        required: false
        type: boolean
        default: true
      runner_label:
        description: |
          Per-PR ephemeral runner-set IMAGE label to select for runs-on
          (image_hf_adapters_pr_<component>_<sha12>, e.g.
          image_hf_adapters_pr_flex_8ddcf3e155e9). The per-PR ephemeral flow passes
          that PR's set label so jobs land on the per-PR image (the changed RPM is
          baked in -> no runtime sudo). Empty keeps push/PR/merge_group runs on the
          standing image_torch_spyre_pinned set (today's behaviour).
        required: false
        type: string
        default: ""

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash
    working-directory: /home/senuser

permissions:
  contents: read
  checks: write

env:
  # The CI env var is very important.
  # GitHub actions automatically sets CI=true
  # which causes the pytest inductor tests to fail with AssertionError
  # due to a mix of fallbacks and decompositions.
  # Here we set it to an empty string (or we could also unset it).
  CI: ""
  CLONED_HF_ADAPTERS_DIR: ${{ github.workspace }}
  STORAGE_1_DIR: /storage-1/hf-adapters
  HF_HOME: /storage-1/hf-adapters/.cache/huggingface
  # Single source of truth for the set of models exercised by the CPU
  # test matrix's `-k` filter. PR is the fast smoke — qwen3 (causal LM) and
  # bge_base (embedding) on CPU; the same bge_base runs on the Spyre
  # embed-compare matrix below so CPU and hardware embedding coverage stay
  # aligned. Daily and weekly cover the broader model set.
  # Invariant: every model_key used in a Spyre matrix below must have its
  # substring present here so CPU sanity-checks anything that runs on hardware.
  # MODELS_FILTER: "qwen3 or bge_base"

jobs:
  pre-commit:
    name: pre-commit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run pre-commit
        uses: pre-commit/action@v3.0.1
        with:
          # Skip the local mypy hook — it requires the project venv with
          # torch/transformers installed, which we don't set up in this lint job.
          extra_args: --all-files --hook-stage commit --show-diff-on-failure
        env:
          SKIP: mypy

  # ===========================================================================
  # Dynamic matrix generation
  #
  # This job generates test matrices dynamically from tests/model_registry.py
  # using the select_representative_models() function. This ensures that:
  # 1. The CI automatically tests new adapters added to CONFIG_TO_ADAPTER_MODULE_MAPPING
  # 2. We maintain a single source of truth for model selection
  # 3. Manual exclusions can be specified below (e.g., for temporarily broken models)
  #
  # To exclude models from all test matrices, add them to the --exclude list below.
  # ===========================================================================
  generate-matrix:
    name: Generate test matrices
    runs-on: ubuntu-latest
    outputs:
      causal_matrix: ${{ steps.generate.outputs.causal_matrix }}
      embed_matrix: ${{ steps.generate.outputs.embed_matrix }}
      vision_matrix: ${{ steps.generate.outputs.vision_matrix }}
      combined_matrix: ${{ steps.generate.outputs.combined_matrix }}
      reranker_matrix: ${{ steps.generate.outputs.reranker_matrix }}
    defaults:
      run:
        working-directory: .
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install transformers torch pytest

      - name: Generate matrices
        id: generate
        run: |
          # Manually exclude models here by adding them to --exclude
          # Example: python .github/scripts/generate_test_matrix.py --exclude ibm-granite/granite-vision-4.1-4b tiiuae/Falcon3-1B-Base

          # We exclude these models - See https://github.com/torch-spyre/hf-adapters/issues/89
          python .github/scripts/generate_test_matrix.py --exclude tiiuae/Falcon3-1B-Base mistralai/Mistral-Small-3.1-24B-Instruct-2503

  adapter-coverage:
    name: adapter coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run adapter coverage test
        run: |
          echo "Checking that all adapter files are registered in model_registry.py..."
          python -m pip install --quiet pytest
          python -m pytest -v --noconftest tests/test_adapter_coverage.py
          echo "Adapter coverage check passed."

