name: test_pull_request

on:
  push:
    branches: [main]
    tags: ["*"]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  merge_group:
    types: [checks_requested]
  workflow_dispatch:
    inputs:
      torch_spyre_ref:
        description: Branch, tag, or SHA of torch-spyre to check out and test
        required: false
        type: string
        default: ""
      rpm_location:
        description: The Artifactory location where to download the RPM from
        required: false
        type: string
        default: ""
      rpm_names:
        description: A space separated list of RPM names to download and install
        required: false
        type: string
        default: ""

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write

jobs:
  pre-commit:
    name: pre-commit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run pre-commit
        uses: pre-commit/action@v3.0.1
        with:
          # Skip the local mypy hook — it requires the project venv with
          # torch/transformers installed, which we don't set up in this lint job.
          extra_args: --all-files --hook-stage commit --show-diff-on-failure
        env:
          SKIP: mypy

  # Shared CPU + Spyre matrices live in _spyre_tests.yaml. PR keeps it fast:
  # the CPU `-k` filter is one causal LM + one embedding, and `@pytest.mark.slow`
  # tests are dropped via `pytest_marker: "not slow"`. Daily/weekly broaden both.
  # Invariant: every model_key used in a Spyre matrix in _spyre_tests.yaml
  # must have its substring present in models_filter so CPU sanity-checks
  # anything that runs on hardware.
  tests:
    name: tests
    uses: ./.github/workflows/_spyre_tests.yaml
    with:
      models_filter: "qwen3 or bge_base"
      pytest_marker: "not slow"
      torch_spyre_ref: ${{ inputs.torch_spyre_ref }}
      rpm_location: ${{ inputs.rpm_location }}
      rpm_names: ${{ inputs.rpm_names }}
    secrets: inherit

  # ===========================================================================
  # Required check gate — fans in pre-commit and the reusable tests workflow
  # so a single branch protection rule ("tests / run spyre unit tests") passes
  # only when both succeed. The reusable workflow's individual matrix jobs
  # still appear as separate checks on the PR; this gate aggregates them.
  # ===========================================================================
  run-spyre-unit-tests:
    name: run spyre unit tests
    runs-on: ubuntu-latest
    needs:
      - pre-commit
      - tests
    if: always()
    steps:
      - name: Check all suites passed
        run: |-
          if ${{ contains(needs.pre-commit.result, 'failure') || contains(needs.pre-commit.result, 'cancelled') ||
                 contains(needs.tests.result, 'failure') || contains(needs.tests.result, 'cancelled') }}; then
            echo "One or more test suites failed."
            exit 1
          fi
          echo "All test suites passed."
