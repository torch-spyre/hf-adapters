    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        # Dynamic matrix: causal-LM models only from tests/model_registry.py
        # Generated by select_representative_models() - one model per adapter
        model_key: ${{ fromJSON(needs.generate-matrix.outputs.causal_matrix) }}

    steps:
      - name: Checkout composite actions
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: .github/actions
          sparse-checkout-cone-mode: false

      - uses: ./.github/actions/build-hf-adapters
        with:
          uv_groups: "dev spyre test"
          rpm_names: ${{ inputs.rpm_names }}
          rpm_location: ${{ inputs.rpm_location }}
          output_dir: ${{ inputs.output_dir }}
          torch_spyre_ref: ${{ inputs.torch_spyre_ref }}
          ref: ${{ inputs.ref }}
          repository: ${{ inputs.repository }}
          artifactory_user: ${{ secrets.ARTIFACTORY_USER }}
          artifactory_api_key: ${{ secrets.ARTIFACTORY_API_KEY }}
          artifactory_base_url: ${{ secrets.ARTIFACTORY_BASE_URL }}
          artifactory_rpm_path: ${{ secrets.ARTIFACTORY_RPM_PATH }}

      - name: Run test_e2e_token_compare_spyre.py for ${{ matrix.model_key }}
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          source "$HOME/.bashrc"
          source /etc/profile.d/ibm-aiu-setup.sh
          cd "$CLONED_HF_ADAPTERS_DIR"
          echo "Running test_e2e_token_compare_spyre.py for ${{ matrix.model_key }}..."
          uv run pytest -s -vvv tests/spyre/test_e2e_token_compare_spyre.py -k "${{ matrix.model_key }}"
          echo "tests done"

  spyre-embed-compare-tests:
    name: Spyre embed compare (${{ matrix.model_key }})
    needs: [generate-matrix]
    runs-on:
      - x86_64
      - spyre_pf_x1__pvc_1tb_x1
      - linux
      - ${{ inputs.runner_label || 'image_torch_spyre_pinned' }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        # Dynamic matrix: embedding models only from tests/model_registry.py
        # Generated by select_representative_models() - one model per adapter
        model_key: ${{ fromJSON(needs.generate-matrix.outputs.embed_matrix) }}

    steps:
      - name: Checkout composite actions
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: .github/actions
          sparse-checkout-cone-mode: false

      - uses: ./.github/actions/build-hf-adapters
        with:
          uv_groups: "dev spyre test"
          rpm_names: ${{ inputs.rpm_names }}
          rpm_location: ${{ inputs.rpm_location }}
          output_dir: ${{ inputs.output_dir }}
          torch_spyre_ref: ${{ inputs.torch_spyre_ref }}
          ref: ${{ inputs.ref }}
          repository: ${{ inputs.repository }}
          artifactory_user: ${{ secrets.ARTIFACTORY_USER }}
          artifactory_api_key: ${{ secrets.ARTIFACTORY_API_KEY }}
          artifactory_base_url: ${{ secrets.ARTIFACTORY_BASE_URL }}
          artifactory_rpm_path: ${{ secrets.ARTIFACTORY_RPM_PATH }}

      - name: Run test_e2e_embed_compare_spyre.py for ${{ matrix.model_key }}
        env:
