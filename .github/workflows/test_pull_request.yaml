name: test_pull_request

on:
  push:
    branches: [main]
    tags: ["*"]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  merge_group:
    types: [checks_requested]
  workflow_dispatch:
    inputs:
      torch_spyre_ref:
        description: Branch, tag, or SHA of torch-spyre to check out and test
        required: false
        type: string
        default: ""
      rpm_location:
        description: The Artifactory location where to download the RPM from
        required: false
        type: string
        default: ""
      rpm_names:
        description: A space separated list of RPM names to download and install
        required: false
        type: string
        default: ""

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  pre-commit:
    name: pre-commit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run pre-commit
        uses: pre-commit/action@v3.0.1
        with:
          # Skip the local mypy hook — it requires the project venv with
          # torch/transformers installed, which we don't set up in this lint job.
          extra_args: --all-files --hook-stage commit --show-diff-on-failure
        env:
          SKIP: mypy

  # ===========================================================================
  # Call the reusable workflow that contains all test job definitions
  # ===========================================================================
  run-tests:
    name: run tests
    uses: ./.github/workflows/_test_jobs.yaml
    with:
      # Single source of truth for the set of models exercised by the CPU
      # test matrix's `-k` filter. PR is the fast smoke — qwen3 (causal LM) and
      # bge_base (embedding) on CPU; the same bge_base runs on the Spyre
      # embed-compare matrix below so CPU and hardware embedding coverage stay
      # aligned. Daily and weekly cover the broader model set.
      # Invariant: every model_key used in a Spyre matrix below must have its
      # substring present here so CPU sanity-checks anything that runs on hardware.
      models_filter: "qwen3 or bge_base"
      # Tests marked `@pytest.mark.slow` are dropped from PR runs and instead
      # exercised by the weekly cron.
      pytest_marker_filter: '-m "not slow"'
      torch_spyre_ref: ${{ inputs.torch_spyre_ref }}
      rpm_location: ${{ inputs.rpm_location }}
      rpm_names: ${{ inputs.rpm_names }}
      output_dir: ${{ inputs.output_dir }}
      # PR workflow does not include the slow generate-edge-cases suite
      include_generate_edge_cases: false
    secrets:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      ARTIFACTORY_USER: ${{ secrets.ARTIFACTORY_USER }}
      ARTIFACTORY_API_KEY: ${{ secrets.ARTIFACTORY_API_KEY }}
      ARTIFACTORY_BASE_URL: ${{ secrets.ARTIFACTORY_BASE_URL }}
      ARTIFACTORY_RPM_PATH: ${{ secrets.ARTIFACTORY_RPM_PATH }}

  # ===========================================================================
  # Required check gate — fans in all matrix jobs so a single branch
  # protection rule ("tests / run spyre unit tests") passes only when every
  # suite passes.
  # ===========================================================================
  run-spyre-unit-tests:
    name: run spyre unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    needs:
      - pre-commit
      - run-tests
    if: always()
    steps:
      - name: Check all suites passed
        run: |-
          if ${{ contains(needs.pre-commit.result, 'failure') || contains(needs.pre-commit.result, 'cancelled') ||
                 contains(needs.run-tests.result, 'failure') || contains(needs.run-tests.result, 'cancelled') }}; then
            echo "One or more test suites failed."
            exit 1
          fi
          echo "All test suites passed."

# Made with Bob
