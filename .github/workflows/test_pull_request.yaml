name: test_pull_request

on:
  push:
    branches: [main]
    tags: ["*"]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  merge_group:
    types: [checks_requested]
  workflow_dispatch:
    inputs:
      torch_spyre_ref:
        description: Branch, tag, or SHA of torch-spyre to check out and test
        required: false
        type: string
        default: ""
      rpm_location:
        description: The Artifactory location where to download the RPM from
        required: false
        type: string
        default: ""
      rpm_names:
        description: A space separated list of RPM names to download and install
        required: false
        type: string
        default: ""

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash
    working-directory: /home/senuser

permissions:
  contents: read
  checks: write

env:
  # The CI env var is very important.
  # GitHub actions automatically sets CI=true
  # which causes the pytest inductor tests to fail with AssertionError
  # due to a mix of fallbacks and decompositions.
  # Here we set it to an empty string (or we could also unset it).
  CI: ""
  CLONED_HF_ADAPTERS_DIR: ${{ github.workspace }}
  STORAGE_1_DIR: /storage-1/hf-adapters
  HF_HOME: /storage-1/hf-adapters/.cache/huggingface
  # Single source of truth for the set of models exercised by the CPU
  # test matrix's `-k` filter. PR is the fast smoke — qwen3 (causal LM) and
  # bge_base (embedding) on CPU; the same bge_base runs on the Spyre
  # embed-compare matrix below so CPU and hardware embedding coverage stay
  # aligned. Daily and weekly cover the broader model set.
  # Invariant: every model_key used in a Spyre matrix below must have its
  # substring present here so CPU sanity-checks anything that runs on hardware.
  MODELS_FILTER: "qwen3 or bge_base"

jobs:
  pre-commit:
    name: pre-commit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run pre-commit
        uses: pre-commit/action@v3.0.1
        with:
          # Skip the local mypy hook — it requires the project venv with
          # torch/transformers installed, which we don't set up in this lint job.
          extra_args: --all-files --hook-stage commit --show-diff-on-failure
        env:
          SKIP: mypy

  cpu-tests:
    name: CPU tests (${{ matrix.test_file }})
    runs-on:
      - x86_64
      - spyre_pf_x0__pvc_1tb_x1
      - linux
      - image_torch_spyre
    timeout-minutes: 120
    strategy:
      matrix:
        # Tests marked `@pytest.mark.slow` are dropped from PR runs (see the
        # `-m "not slow"` flag below) and instead exercised by the weekly cron.
        test_file:
          - test_load_cpu.py
          - test_adapter_cpu_accuracy.py
          - test_embed_cpu_accuracy.py
          - test_generate_edge_cases_cpu.py
          - test_multibatch_generate_cpu.py
          - test_st_backend_cpu.py

    steps:
      - name: Checkout composite actions
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: .github/actions
          sparse-checkout-cone-mode: false

      - uses: ./.github/actions/build-hf-adapters
        with:
          uv_groups: "dev test"
          rpm_names: ${{ inputs.rpm_names }}
          rpm_location: ${{ inputs.rpm_location }}
          output_dir: ${{ inputs.output_dir }}
          torch_spyre_ref: ${{ inputs.torch_spyre_ref }}
          artifactory_user: ${{ secrets.ARTIFACTORY_USER }}
          artifactory_api_key: ${{ secrets.ARTIFACTORY_API_KEY }}
          artifactory_base_url: ${{ secrets.ARTIFACTORY_BASE_URL }}
          artifactory_rpm_path: ${{ secrets.ARTIFACTORY_RPM_PATH }}

      - name: Run ${{ matrix.test_file }}
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          unset _IBM_AIU_SETUP
          rm -f /tmp/etc/ibm/spyre/topo.json
          source "$HOME/.bashrc"
          source /etc/profile.d/ibm-aiu-setup.sh
          cd "$CLONED_HF_ADAPTERS_DIR"
          echo "Running ${{ matrix.test_file }}..."
          uv run pytest -s -vvv -m "not slow" -k "$MODELS_FILTER" "tests/${{ matrix.test_file }}"
          echo "tests done"

  spyre-load-tests:
    name: Spyre load (${{ matrix.model_key }})
    runs-on:
      - x86_64
      - spyre_pf_x1__pvc_1tb_x1
      - linux
      - image_torch_spyre
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        # All causal-LM and embedding keys from tests/model_registry.py.
        # Commented-out entries are valid registry keys we deliberately exclude
        # from PR runs — each comment names the reason.
        model_key:
          # Causal LM
          - qwen3
          - granite
          - granite2b
          - granite4
          - smollm3
          - tiny_llama
          # phi4 — partial_rotary_factor=0.75 needs a compiler fix (see CLAUDE.md);
          #        load path itself works, but excluded for parity with the rest of the Spyre matrices.
          # - phi4
          - qwen2
          - ministral
          - olmo
          - olmo2
          - falcon3
          - deepseek-coder
          - granite-vision
          # gemma4 — no public checkpoint at google/gemma-4-12B-it yet; the registry
          #          path 404s on HF so the load test cannot pull weights.
          # - gemma4
          # Embedding
          - qwen3_embed
          - qwen2_embed
          - e5_mistral
          - linq_embed_mistral
          - sfr_embedding_mistral
          - bge_base
          - minilm
          - bge_m3
          - mpnet
          - modernbert
          - gte_modernbert
          - granite_embed

    steps:
      - name: Checkout composite actions
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: .github/actions
          sparse-checkout-cone-mode: false

      - uses: ./.github/actions/build-hf-adapters
        with:
          uv_groups: "dev spyre test"
          rpm_names: ${{ inputs.rpm_names }}
          rpm_location: ${{ inputs.rpm_location }}
          output_dir: ${{ inputs.output_dir }}
          torch_spyre_ref: ${{ inputs.torch_spyre_ref }}
          artifactory_user: ${{ secrets.ARTIFACTORY_USER }}
          artifactory_api_key: ${{ secrets.ARTIFACTORY_API_KEY }}
          artifactory_base_url: ${{ secrets.ARTIFACTORY_BASE_URL }}
          artifactory_rpm_path: ${{ secrets.ARTIFACTORY_RPM_PATH }}

      - name: Run test_load_spyre.py for ${{ matrix.model_key }}
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          source "$HOME/.bashrc"
          source /etc/profile.d/ibm-aiu-setup.sh
          cd "$CLONED_HF_ADAPTERS_DIR"
          echo "Running test_load_spyre.py for ${{ matrix.model_key }}..."
          uv run pytest -s -vvv tests/spyre/test_load_spyre.py -k "${{ matrix.model_key }}"
          echo "tests done"

  spyre-smoke-tests:
    name: Spyre smoke (${{ matrix.model_key }})
    runs-on:
      - x86_64
      - spyre_pf_x1__pvc_1tb_x1
      - linux
      - image_torch_spyre
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        # All causal-LM keys from tests/model_registry.py::CAUSAL_LM_MODELS.
        model_key:
          - qwen3
          - granite
          - granite2b
          - granite4
          - smollm3
          - tiny_llama
          # phi4 — partial_rotary_factor=0.75 needs a compiler fix (see CLAUDE.md).
          # - phi4
          - qwen2
          - ministral
          - olmo
          - olmo2
          - falcon3
          - deepseek-coder
          # granite-vision — multimodal; load_fn=True in the registry. The smoke
          #                   driver calls AutoSpyreModelForCausalLM.from_pretrained
          #                   directly and does not handle the custom loader.
          # - granite-vision
          # gemma4 — no public checkpoint at google/gemma-4-12B-it (HF 404).
          # - gemma4

    steps:
      - name: Checkout composite actions
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: .github/actions
          sparse-checkout-cone-mode: false

      - uses: ./.github/actions/build-hf-adapters
        with:
          uv_groups: "dev spyre test"
          rpm_names: ${{ inputs.rpm_names }}
          rpm_location: ${{ inputs.rpm_location }}
          output_dir: ${{ inputs.output_dir }}
          torch_spyre_ref: ${{ inputs.torch_spyre_ref }}
          artifactory_user: ${{ secrets.ARTIFACTORY_USER }}
          artifactory_api_key: ${{ secrets.ARTIFACTORY_API_KEY }}
          artifactory_base_url: ${{ secrets.ARTIFACTORY_BASE_URL }}
          artifactory_rpm_path: ${{ secrets.ARTIFACTORY_RPM_PATH }}

      - name: Run test_e2e_smoke_spyre.py for ${{ matrix.model_key }}
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          source "$HOME/.bashrc"
          source /etc/profile.d/ibm-aiu-setup.sh
          cd "$CLONED_HF_ADAPTERS_DIR"
          echo "Running test_e2e_smoke_spyre.py for ${{ matrix.model_key }}..."
          uv run pytest -s -vvv tests/spyre/test_e2e_smoke_spyre.py -k "${{ matrix.model_key }}"
          echo "tests done"

  spyre-token-compare-tests:
    name: Spyre token compare (${{ matrix.model_key }})
    runs-on:
      - x86_64
      - spyre_pf_x1__pvc_1tb_x1
      - linux
      - image_torch_spyre
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        # All causal-LM keys from tests/model_registry.py::CAUSAL_LM_MODELS.
        model_key:
          - qwen3
          - granite
          - granite2b
          - granite4
          - smollm3
          - tiny_llama
          # phi4 — partial_rotary_factor=0.75 needs a compiler fix (see CLAUDE.md).
          # - phi4
          - qwen2
          - ministral
          - olmo
          - olmo2
          - falcon3
          - deepseek-coder
          # granite-vision — multimodal; the token-compare driver calls
          #                   AutoSpyreModelForCausalLM.from_pretrained and does
          #                   not handle the custom loader (load_fn=True).
          # - granite-vision
          # gemma4 — no public checkpoint at google/gemma-4-12B-it (HF 404).
          # - gemma4

    steps:
      - name: Checkout composite actions
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: .github/actions
          sparse-checkout-cone-mode: false

      - uses: ./.github/actions/build-hf-adapters
        with:
          uv_groups: "dev spyre test"
          rpm_names: ${{ inputs.rpm_names }}
          rpm_location: ${{ inputs.rpm_location }}
          output_dir: ${{ inputs.output_dir }}
          torch_spyre_ref: ${{ inputs.torch_spyre_ref }}
          artifactory_user: ${{ secrets.ARTIFACTORY_USER }}
          artifactory_api_key: ${{ secrets.ARTIFACTORY_API_KEY }}
          artifactory_base_url: ${{ secrets.ARTIFACTORY_BASE_URL }}
          artifactory_rpm_path: ${{ secrets.ARTIFACTORY_RPM_PATH }}

      - name: Run test_e2e_token_compare_spyre.py for ${{ matrix.model_key }}
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          source "$HOME/.bashrc"
          source /etc/profile.d/ibm-aiu-setup.sh
          cd "$CLONED_HF_ADAPTERS_DIR"
          echo "Running test_e2e_token_compare_spyre.py for ${{ matrix.model_key }}..."
          uv run pytest -s -vvv tests/spyre/test_e2e_token_compare_spyre.py -k "${{ matrix.model_key }}"
          echo "tests done"

  spyre-embed-compare-tests:
    name: Spyre embed compare (${{ matrix.model_key }})
    runs-on:
      - x86_64
      - spyre_pf_x1__pvc_1tb_x1
      - linux
      - image_torch_spyre
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        # All embedding keys from tests/model_registry.py::EMBEDDING_MODELS.
        model_key:
          - qwen3_embed
          - qwen2_embed
          - e5_mistral
          - linq_embed_mistral
          - sfr_embedding_mistral
          - bge_base
          - minilm
          - bge_m3
          - mpnet
          - modernbert
          - gte_modernbert
          - granite_embed

    steps:
      - name: Checkout composite actions
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: .github/actions
          sparse-checkout-cone-mode: false

      - uses: ./.github/actions/build-hf-adapters
        with:
          uv_groups: "dev spyre test"
          rpm_names: ${{ inputs.rpm_names }}
          rpm_location: ${{ inputs.rpm_location }}
          output_dir: ${{ inputs.output_dir }}
          torch_spyre_ref: ${{ inputs.torch_spyre_ref }}
          artifactory_user: ${{ secrets.ARTIFACTORY_USER }}
          artifactory_api_key: ${{ secrets.ARTIFACTORY_API_KEY }}
          artifactory_base_url: ${{ secrets.ARTIFACTORY_BASE_URL }}
          artifactory_rpm_path: ${{ secrets.ARTIFACTORY_RPM_PATH }}

      - name: Run test_e2e_embed_compare_spyre.py for ${{ matrix.model_key }}
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          source "$HOME/.bashrc"
          source /etc/profile.d/ibm-aiu-setup.sh
          cd "$CLONED_HF_ADAPTERS_DIR"
          echo "Running test_e2e_embed_compare_spyre.py for ${{ matrix.model_key }}..."
          uv run pytest -s -vvv tests/spyre/test_e2e_embed_compare_spyre.py -k "${{ matrix.model_key }}"
          echo "tests done"

  spyre-block-compare-tests:
    name: Spyre block compare (${{ matrix.model_key }})
    runs-on:
      - x86_64
      - spyre_pf_x1__pvc_1tb_x1
      - linux
      - image_torch_spyre
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        # Block-compare uses tests/test_block_cpu_vs_spyre.py, which has its own
        # architecture-keyed registry (one entry per adapter family, not per
        # checkpoint). We enumerate every key from tests/model_registry.py here
        # and route checkpoint keys to their architecture key — duplicates
        # within the same family are commented out because they exercise the
        # same compiled block path.
        model_key:
          - qwen3
          - granite
          # granite2b — same adapter (hf_granite) as `granite`; block-compare
          #             registry keys are architecture-level.
          # - granite2b
          - granite4
          - smollm3
          # tiny_llama, falcon3, deepseek-coder all use hf_llama — covered by
          # the `llama` architecture key in the block-compare registry.
          - llama
          # - tiny_llama
          # - falcon3
          # - deepseek-coder
          # phi4 — uses hf_phi3, which is not in the block-compare registry; also
          #        partial_rotary_factor=0.75 needs a compiler fix (see CLAUDE.md).
          # - phi4
          - qwen2
          # ministral uses hf_mistral — covered by the `mistral` architecture key.
          - mistral
          # - ministral
          - olmo
          - olmo2
          - granite-vision
          # gemma4 — uses hf_gemma4, which is not in the block-compare registry,
          #          and there is no public google/gemma-4-12B-it checkpoint yet.
          # - gemma4
          # Embedding models — block-compare today only covers causal-LM
          # architectures. Embedding adapters (hf_bert, hf_xlm_roberta, hf_mpnet,
          # hf_modernbert) are not in the block-compare registry.
          # - qwen3_embed
          # - qwen2_embed
          # - e5_mistral
          # - linq_embed_mistral
          # - sfr_embedding_mistral
          # - bge_base
          # - minilm
          # - bge_m3
          # - mpnet
          # - modernbert
          # - gte_modernbert
          # - granite_embed

    steps:
      - name: Checkout composite actions
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: .github/actions
          sparse-checkout-cone-mode: false

      - uses: ./.github/actions/build-hf-adapters
        with:
          uv_groups: "dev spyre test"
          rpm_names: ${{ inputs.rpm_names }}
          rpm_location: ${{ inputs.rpm_location }}
          output_dir: ${{ inputs.output_dir }}
          torch_spyre_ref: ${{ inputs.torch_spyre_ref }}
          artifactory_user: ${{ secrets.ARTIFACTORY_USER }}
          artifactory_api_key: ${{ secrets.ARTIFACTORY_API_KEY }}
          artifactory_base_url: ${{ secrets.ARTIFACTORY_BASE_URL }}
          artifactory_rpm_path: ${{ secrets.ARTIFACTORY_RPM_PATH }}

      - name: Run test_block_cpu_vs_spyre.py for ${{ matrix.model_key }}
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          source "$HOME/.bashrc"
          source /etc/profile.d/ibm-aiu-setup.sh
          cd "$CLONED_HF_ADAPTERS_DIR"
          echo "Running test_block_cpu_vs_spyre.py for ${{ matrix.model_key }}..."
          uv run pytest -s -vvv tests/spyre/test_block_cpu_vs_spyre.py -k "${{ matrix.model_key }}"
          echo "tests done"

  # ===========================================================================
  # Required check gate — fans in all matrix jobs so a single branch
  # protection rule ("tests / run spyre unit tests") passes only when every
  # suite passes.
  # ===========================================================================
  run-spyre-unit-tests:
    name: run spyre unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    needs:
      - pre-commit
      - cpu-tests
      - spyre-load-tests
      - spyre-smoke-tests
      - spyre-token-compare-tests
      - spyre-embed-compare-tests
      - spyre-block-compare-tests
    if: always()
    steps:
      - name: Check all suites passed
        run: |-
          if ${{ contains(needs.pre-commit.result, 'failure') || contains(needs.pre-commit.result, 'cancelled') ||
                 contains(needs.cpu-tests.result, 'failure') || contains(needs.cpu-tests.result, 'cancelled') ||
                 contains(needs.spyre-load-tests.result, 'failure') || contains(needs.spyre-load-tests.result, 'cancelled') ||
                 contains(needs.spyre-smoke-tests.result, 'failure') || contains(needs.spyre-smoke-tests.result, 'cancelled') ||
                 contains(needs.spyre-token-compare-tests.result, 'failure') || contains(needs.spyre-token-compare-tests.result, 'cancelled') ||
                 contains(needs.spyre-embed-compare-tests.result, 'failure') || contains(needs.spyre-embed-compare-tests.result, 'cancelled') ||
                 contains(needs.spyre-block-compare-tests.result, 'failure') || contains(needs.spyre-block-compare-tests.result, 'cancelled') }}; then
            echo "One or more test suites failed."
            exit 1
          fi
          echo "All test suites passed."
