name: test each pull request

on:
  push:
    branches: [main]
    tags: ['*']
  # pull_request:
  #   branches: [main]
  merge_group:
    types: [checks_requested]
  workflow_dispatch:
    inputs:
      ref:
        description: Branch, tag, or SHA to check out and test
        required: false
        type: string
        default: ''
      repository:
        description: Full clone URL of the fork to check out (e.g. "https://github.com/myuser/hf-adapters.git"); leave empty for the base repo
        required: true
        type: string
        default: ''
      pr_url_hash:
        description: |
          Hash of the full URL of the PR that triggered this run.
          Required when triggered by an external PR.
        required: true
        type: string
      runner_label:
        description: |
          Per-PR ephemeral runner-set IMAGE label to select
          (image_torch_spyre_pinned_pr_<component>_<sha12>, e.g. image_torch_spyre_pinned_pr_flex_8ddcf3e155e9).
          Empty = use the standing image_torch_spyre_pinned set
        required: false
        type: string
        default: ''
      test_type:
        description: >-
          Suite subset to run: smoke | core | full | suite_<group> | <label>.
          Default: full (every config).
        required: false
        type: string
        default: full

concurrency:
  group: ${{ github.workflow }}-${{ (github.event_name == 'pull_request' && github.event.pull_request.html_url) || (github.event_name == 'workflow_dispatch'
    && inputs.pr_url_hash != '' && inputs.pr_url_hash) || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write
  pull-requests: read # so that gh pr view can fetch the file list

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: changes
  #
  # Runs on every PR. Uses gh CLI to fetch the full list of changed files
  # and checks if any file outside tests/docs/, docs/, README.md, or
  # CODEOWNERS was modified.
  #
  # code_changed=true  --> non-doc files changed  --> run tests
  # code_changed=false --> only doc/CODEOWNERS files changed --> skip tests
  # ---------------------------------------------------------------------------
  changes:
    name: Detect changed files
    runs-on: ubuntu-latest
    outputs:
      code_changed: ${{ steps.filter.outputs.code_changed }}
    steps:
      - name: Check which paths changed
        id: filter
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # On pull_request events, fetch the full list of changed files via
          # the GitHub API. On push to main/tag or workflow_dispatch, assume
          # tests should always run since we don't have a PR to query.
          if [[ -n "${{ github.event.pull_request.number }}" ]]; then
            FILES=$(gh pr view ${{ github.event.pull_request.number }} \
              --repo ${{ github.repository }} \
              --json files --jq '.files[].path')
          else
            # push to main, tag, or manual dispatch -- always run tests
            FILES="non-doc-change"
          fi

          echo "Changed files:"
          echo "$FILES"

          # Check if any changed file is outside the doc directories.
          # tests/docs/, docs/, README.md, and CODEOWNERS are the only paths
          # that should skip tests.
          NON_DOC=$(echo "$FILES" | grep -v '^tests/docs/' | grep -v '^docs/' | grep -v '^README\.md$' | grep -v '^CODEOWNERS$' || true)

          if [[ -z "$NON_DOC" ]]; then
            echo "Only doc files changed — skipping tests."
            echo "code_changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "Non-doc files changed — running tests."
            echo "code_changed=true" >> "$GITHUB_OUTPUT"
          fi

  # ---------------------------------------------------------------------------
  # Job 2: delegate to the shared test matrix
  #
  # Only runs when `changes.code_changed == 'true'`. For docs-only PRs the
  # reusable workflow is never invoked — no hardware runners are consumed.
  # ---------------------------------------------------------------------------
  run-tests:
    needs: changes
    if: needs.changes.outputs.code_changed == 'true'
    uses: ./.github/workflows/_test_matrix.yaml
    with:
      # Per-PR ephemeral image label when provided, else the standing set.
      image_label: ${{ inputs.runner_label || 'image_torch_spyre_pinned' }}
      extra_test_flags: -vvv -s
      extra_test_flags_multi_spyre: -vvv -s
      ref: ${{ inputs.ref || '' }}
      repository: ${{ inputs.repository || '' }}
      test_type: ${{ inputs.test_type || 'full' }}

  # ---------------------------------------------------------------------------
  # Job 3: run-spyre-unit-tests (required check gate)
  #
  # This job name MUST match the branch protection required check exactly:
  #   "tests / Run Spyre unit tests"
  #
  # It fans in the reusable workflow result. Three outcomes are handled:
  #
  #   run-tests result = success -> all suites passed      -> green
  #   run-tests result = skipped -> docs-only PR, no tests -> green (instant)
  #   run-tests result = failure -> one or more suites bad -> red   (blocks merge)
  # ---------------------------------------------------------------------------
  run-spyre-unit-tests:
    name: run spyre unit tests
    runs-on: ubuntu-latest
    needs: [changes, run-tests]
    if: always()
    steps:
      - name: Evaluate test results
        run: |-
          RESULT="${{ needs.run-tests.result }}"
          echo "run-tests result: ${RESULT}"

          if [[ "${RESULT}" == "success" ]]; then
            echo "All test suites passed."
            exit 0
          fi

          if [[ "${RESULT}" == "skipped" ]]; then
            echo "Tests skipped — docs-only change, no test-relevant files modified."
            exit 0
          fi

          echo "One or more test suites failed or were cancelled."
          exit 1
