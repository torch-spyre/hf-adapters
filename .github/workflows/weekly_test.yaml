# =============================================================================
# Weekly test workflow
#
# Mirrors daily_test.yaml's structure (same job shape, same composite build
# action, same `MODELS_FILTER` invariant). Weekly's purpose is the *full
# coverage sweep*: it widens the model surface beyond daily's known-good set
# to catch regressions in adapters that nobody touched recently.
#
# Differences vs daily_test.yaml, all intentional:
#
#   1. Trigger
#      - Daily:  schedule (06:00 UTC every day) + workflow_dispatch.
#      - Weekly: schedule (22:00 UTC every Saturday) + workflow_dispatch.
#
#   2. CPU `MODELS_FILTER` covers every adapter
#      Short-substring form matches all 27 keys across the causal-LM and
#      embedding registries. CPU is cheap, so weekly tests every adapter
#      against every CPU test file.
#      Invariant: every model_key in a Spyre matrix below has its substring
#      present here so CPU sanity-checks anything that runs on hardware.
#
#   3. Spyre matrices = daily Spyre + tier-2 overflow
#      Daily covers the proven-good set. Weekly adds adapters that have been
#      validated to load but aren't part of the daily heartbeat. Expansion is
#      gradual — a few entries per week as new adapters get their first green
#      Spyre run, until full Spyre coverage is reached.
#      Skipped for now: phi4 (compiler fix in flight), granite-vision (custom
#      loader needs job-specific handling), mistral-family (license click-
#      through pending on the CI HF account).
#
# Same as daily (not differences):
#   - No pre-commit job, no fan-in gate (same reasoning as daily).
#   - CPU step has no `-m` filter; slow tests run.
#   - HF_TOKEN plumbed through every step.
#   - Same workloads as daily — weekly varies the X axis (models), not Y
#     (workload). Stress testing, if needed, belongs in a separate workflow.
# =============================================================================
name: weekly_test

on:
  schedule:
    # Runs at 22:00 UTC every Saturday
    - cron: "0 22 * * 6"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash
    working-directory: /home/senuser

permissions:
  contents: read
  checks: write

env:
  # The CI env var is very important.
  # GitHub actions automatically sets CI=true
  # which causes the pytest inductor tests to fail with AssertionError
  # due to a mix of fallbacks and decompositions.
  # Here we set it to an empty string (or we could also unset it).
  CI: ""
  CLONED_HF_ADAPTERS_DIR: ${{ github.workspace }}
  STORAGE_1_DIR: /storage-1/hf-adapters
  HF_HOME: /storage-1/hf-adapters/.cache/huggingface
  # Single source of truth for the set of models exercised by the CPU
  # test matrix's `-k` filter. Weekly sweeps every adapter via short
  # substrings (e.g. `qwen` matches qwen2/qwen3/qwen2_embed/qwen3_embed).
  # Daily (daily_test.yaml) covers the known-good subset.
  # Invariant: every model_key used in a Spyre matrix below must have its
  # substring present here so CPU sanity-checks anything that runs on hardware.
  MODELS_FILTER: "qwen or granite or smollm3 or llama or phi4 or mistral or olmo or falcon3 or deepseek-coder or bge or minilm or mpnet or modernbert"

jobs:
  cpu-tests:
    name: CPU tests (${{ matrix.test_file }})
    runs-on:
      - x86_64
      - spyre_pf_x0__pvc_1tb_x1
      - linux
      - image_torch_spyre
    timeout-minutes: 120
    strategy:
      matrix:
        test_file:
          - test_load_cpu.py
          - test_adapter_cpu_accuracy.py
          - test_embed_cpu_accuracy.py
          - test_generate_edge_cases_cpu.py
          - test_multibatch_generate_cpu.py
          - test_st_backend_cpu.py

    steps:
      - name: Checkout composite actions
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: .github/actions
          sparse-checkout-cone-mode: false

      - uses: ./.github/actions/build-hf-adapters
        with:
          uv_groups: dev test

      - name: Run ${{ matrix.test_file }}
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          unset _IBM_AIU_SETUP
          rm -f /tmp/etc/ibm/spyre/topo.json
          source "$HOME/.bashrc"
          source /etc/profile.d/ibm-aiu-setup.sh
          cd "$CLONED_HF_ADAPTERS_DIR"
          echo "Running ${{ matrix.test_file }}..."
          uv run pytest -s -vvv -k "$MODELS_FILTER" "tests/${{ matrix.test_file }}"
          echo "tests done"

  spyre-load-tests:
    name: Spyre load (${{ matrix.model_key }})
    runs-on:
      - x86_64
      - spyre_pf_x1__pvc_1tb_x1
      - linux
      - image_torch_spyre
    timeout-minutes: 120
    strategy:
      matrix:
        model_key:
          # Daily set
          - qwen3
          - granite
          - granite2b
          - bge_m3
          # Weekly tier-2 expansion
          - granite4
          - llama
          - minilm
          # Skipped (re-enable as adapters are validated):
          # - smollm3
          # - phi4
          # - qwen2
          # - mistral
          # - olmo
          # - olmo2
          # - falcon3
          # - deepseek-coder
          # - yi
          # - granite-vision
          # - mpnet
          # - modernbert
          # - qwen3_embed

    steps:
      - name: Checkout composite actions
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: .github/actions
          sparse-checkout-cone-mode: false

      - uses: ./.github/actions/build-hf-adapters
        with:
          uv_groups: dev spyre test

      - name: Run test_load_spyre.py for ${{ matrix.model_key }}
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          source "$HOME/.bashrc"
          source /etc/profile.d/ibm-aiu-setup.sh
          cd "$CLONED_HF_ADAPTERS_DIR"
          echo "Running tests/spyre/test_load_spyre.py for ${{ matrix.model_key }}..."
          uv run pytest -s -vvv "tests/spyre/test_load_spyre.py" -k "${{ matrix.model_key }}"
          echo "tests done"

  spyre-smoke-tests:
    name: Spyre smoke (${{ matrix.model_key }})
    runs-on:
      - x86_64
      - spyre_pf_x1__pvc_1tb_x1
      - linux
      - image_torch_spyre
    timeout-minutes: 120
    strategy:
      matrix:
        model_key:
          # Daily set
          - qwen3
          - granite
          - granite2b
          - granite4
          # Weekly tier-2 expansion
          - llama
          # Skipped (re-enable as adapters are validated):
          # - smollm3
          # - phi4
          # - qwen2
          # - mistral
          # - olmo
          # - olmo2
          # - falcon3
          # - deepseek-coder
          # - yi
          # - granite-vision

    steps:
      - name: Checkout composite actions
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: .github/actions
          sparse-checkout-cone-mode: false

      - uses: ./.github/actions/build-hf-adapters
        with:
          uv_groups: dev spyre test

      - name: Run test_e2e_smoke_spyre.py for ${{ matrix.model_key }}
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          source "$HOME/.bashrc"
          source /etc/profile.d/ibm-aiu-setup.sh
          cd "$CLONED_HF_ADAPTERS_DIR"
          echo "Running tests/spyre/test_e2e_smoke_spyre.py for ${{ matrix.model_key }}..."
          uv run pytest -s -vvv "tests/spyre/test_e2e_smoke_spyre.py" -k "${{ matrix.model_key }}"
          echo "tests done"

  spyre-token-compare-tests:
    name: Spyre token compare (${{ matrix.model_key }})
    runs-on:
      - x86_64
      - spyre_pf_x1__pvc_1tb_x1
      - linux
      - image_torch_spyre
    timeout-minutes: 120
    strategy:
      matrix:
        model_key:
          # Daily set
          - qwen3
          - granite
          # Weekly tier-2 expansion
          - granite2b
          - llama
          # Skipped (re-enable as adapters are validated):
          # - qwen2
          # - mistral
          # - olmo
          # - olmo2
          # - falcon3

    steps:
      - name: Checkout composite actions
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: .github/actions
          sparse-checkout-cone-mode: false

      - uses: ./.github/actions/build-hf-adapters
        with:
          uv_groups: dev spyre test

      - name: Run test_e2e_token_compare_spyre.py for ${{ matrix.model_key }}
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          source "$HOME/.bashrc"
          source /etc/profile.d/ibm-aiu-setup.sh
          cd "$CLONED_HF_ADAPTERS_DIR"
          echo "Running tests/spyre/test_e2e_token_compare_spyre.py for ${{ matrix.model_key }}..."
          uv run pytest -s -vvv "tests/spyre/test_e2e_token_compare_spyre.py" -k "${{ matrix.model_key }}"
          echo "tests done"

  spyre-embed-compare-tests:
    name: Spyre embed compare (${{ matrix.model_key }})
    runs-on:
      - x86_64
      - spyre_pf_x1__pvc_1tb_x1
      - linux
      - image_torch_spyre
    timeout-minutes: 120
    strategy:
      matrix:
        model_key:
          # Daily set
          - qwen3_embed
          - bge_base
          - bge_m3
          # Weekly tier-2 expansion
          - minilm
          # Skipped (re-enable as adapters are validated):
          # - mpnet
          # - modernbert
          # - gte_modernbert
          # - granite_embed
          # - qwen2_embed

    steps:
      - name: Checkout composite actions
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: .github/actions
          sparse-checkout-cone-mode: false

      - uses: ./.github/actions/build-hf-adapters
        with:
          uv_groups: dev spyre test

      - name: Run test_e2e_embed_compare_spyre.py for ${{ matrix.model_key }}
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          source "$HOME/.bashrc"
          source /etc/profile.d/ibm-aiu-setup.sh
          cd "$CLONED_HF_ADAPTERS_DIR"
          echo "Running tests/spyre/test_e2e_embed_compare_spyre.py for ${{ matrix.model_key }}..."
          uv run pytest -s -vvv "tests/spyre/test_e2e_embed_compare_spyre.py" -k "${{ matrix.model_key }}"
          echo "tests done"

  spyre-block-compare-tests:
    name: Spyre block compare (${{ matrix.model_key }})
    runs-on:
      - x86_64
      - spyre_pf_x1__pvc_1tb_x1
      - linux
      - image_torch_spyre
    timeout-minutes: 120
    strategy:
      matrix:
        model_key:
          # Daily set
          - qwen3
          - granite
          - granite2b
          # Weekly tier-2 expansion
          - llama
          # Skipped (re-enable as adapters are validated):
          # - granite4
          # - smollm3
          # - qwen2
          # - mistral
          # - olmo

    steps:
      - name: Checkout composite actions
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: .github/actions
          sparse-checkout-cone-mode: false

      - uses: ./.github/actions/build-hf-adapters
        with:
          uv_groups: dev spyre test

      - name: Run test_block_cpu_vs_spyre.py for ${{ matrix.model_key }}
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          source "$HOME/.bashrc"
          source /etc/profile.d/ibm-aiu-setup.sh
          cd "$CLONED_HF_ADAPTERS_DIR"
          echo "Running tests/spyre/test_block_cpu_vs_spyre.py for ${{ matrix.model_key }}..."
          uv run pytest -s -vvv "tests/spyre/test_block_cpu_vs_spyre.py" -m spyre_block -k "${{ matrix.model_key }}"
          echo "tests done"

  spyre-generate-edge-cases-tests:
    name: Spyre edge ${{ matrix.case_file }} (${{ matrix.model_key }})
    runs-on:
      - x86_64
      - spyre_pf_x1__pvc_1tb_x1
      - linux
      - image_torch_spyre
    timeout-minutes: 120
    strategy:
      matrix:
        model_key:
          # Daily set
          - qwen3
          - granite
          - granite2b
          # Weekly tier-2 expansion
          - granite4
          - llama
        # One file per case under tests/spyre/edge_cases/. Each (model × case)
        # cell is its own runner process — fresh VFIO DMA mappings without
        # multiprocessing wiring.
        case_file:
          - test_greedy_single_token_prompt
          - test_greedy_short_one_token
          - test_greedy_short_block_minus_one
          - test_greedy_short_cross_block
          - test_greedy_short_two_blocks_plus
          - test_greedy_prompt_exactly_block
          - test_greedy_long_multi_block
          - test_greedy_mixed_short
          - test_greedy_mixed_with_single_token
          - test_eos_first_token
          - test_eos_mid_block
          - test_eos_first_of_second_block
          - test_eos_on_last_step
          - test_zero_new_tokens
          - test_sampling_determinism
          - test_no_eos_runs_full_budget
          - test_no_pad_token_fallback
          - test_sampling_top_k_zero
          - test_eos_inside_prompt

    steps:
      - name: Checkout composite actions
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: .github/actions
          sparse-checkout-cone-mode: false

      - uses: ./.github/actions/build-hf-adapters
        with:
          uv_groups: dev spyre test

      - name: Run ${{ matrix.case_file }} for ${{ matrix.model_key }}
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          source "$HOME/.bashrc"
          source /etc/profile.d/ibm-aiu-setup.sh
          cd "$CLONED_HF_ADAPTERS_DIR"
          echo "Running tests/spyre/edge_cases/${{ matrix.case_file }}.py for ${{ matrix.model_key }}..."
          uv run pytest -s -vvv "tests/spyre/edge_cases/${{ matrix.case_file }}.py" -k "${{ matrix.model_key }}"
          echo "tests done"
