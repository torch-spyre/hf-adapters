name: 'weekly_test'

on:
  schedule:
    # Runs at 06:00 UTC every Monday
    - cron: '0 6 * * 1'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash
    working-directory: /home/senuser

permissions:
  contents: read
  checks: write


env:
  # The CI env var is very important.
  # GitHub actions automatically sets CI=true
  # which causes the pytest inductor tests to fail with AssertionError
  # due to a mix of fallbacks and decompositions.
  # Here we set it to an empty string (or we could also unset it).
  CI: ''
  CLONED_HF_ADAPTERS_DIR: /home/senuser/hf-adapters
  STORAGE_1_DIR: /storage-1/hf-adapaters
  HF_HOME: /storage-1/hf-adapaters/.cache/huggingface

jobs:
  cpu-tests:
    name: CPU tests (${{ matrix.test_file }})
    runs-on:
      - x86_64
      - spyre_pf_x0__pvc_1tb_x1
      - linux
      - image_spyre_inference # move to image_torch_spyre once available
    timeout-minutes: 120
    strategy:
      matrix:
        test_file:
          - test_load_cpu.py
          - test_adapter_cpu_accuracy.py
          - test_embed_cpu_accuracy.py
          - test_generate_edge_cases_cpu.py
          - test_multibatch_generate.py
          - test_st_backend_cpu.py

    steps:
      - name: Checkout PR branch/commit
        id: resolve-sha
        env:
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF: ${{ github.ref }}
        run: |
          source "$HOME/.bashrc"
          source /etc/profile.d/ibm-aiu-setup.sh
          git config --global --add safe.directory '*'
          rm -fr "$CLONED_HF_ADAPTERS_DIR"
          git clone --depth=1 "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY.git" "$CLONED_HF_ADAPTERS_DIR"
          cd "$CLONED_HF_ADAPTERS_DIR"
          TARGET_SHA="${PR_HEAD_SHA:-$GITHUB_SHA}"
          TARGET_REF="${PR_HEAD_REF:-$GITHUB_REF}"
          echo "TARGET_REF=${TARGET_REF}"
          echo "TARGET_SHA=${TARGET_SHA}"
          git fetch --tags --force origin "+${TARGET_SHA}" || \
            git fetch --tags --force origin
          git checkout --force "${TARGET_SHA}"
          git log -1 --oneline
          echo "target_sha=${TARGET_SHA}" >> "$GITHUB_OUTPUT"

      - name: Gather runner info
        run: |
          source "$HOME/.bashrc"
          source /etc/profile.d/ibm-aiu-setup.sh
          date
          pwd
          whoami
          id
          echo "GHA_RUNNER_POD_NODE_NAME $GHA_RUNNER_POD_NODE_NAME"
          echo "PATH $PATH"
          echo "HOME $HOME"
          python3 --version
          python3 -c 'import sys; print(sys.path)'
          echo "--- env ---"
          env | sort
          echo "--- AIU env ---"
          env | sort | grep AIU || true

      - name: Build hf-adapters
        run: |
          source "$HOME/.bashrc"
          source /etc/profile.d/ibm-aiu-setup.sh
          cd "$CLONED_HF_ADAPTERS_DIR"
          uv sync --frozen --verbose --refresh --group dev --group test
          uv pip show torch
          uv pip freeze

      - name: Run ${{ matrix.test_file }}
        run: |
          unset _IBM_AIU_SETUP
          rm -f /tmp/etc/ibm/spyre/topo.json
          source "$HOME/.bashrc"
          source /etc/profile.d/ibm-aiu-setup.sh
          cd "$CLONED_HF_ADAPTERS_DIR"
          echo "Running ${{ matrix.test_file }}..."
          uv run pytest -s -vvv -k "qwen3 or granite or granite2b or granite4 or bge_base or bge_m3" "tests/${{ matrix.test_file }}"
          echo "tests done"

