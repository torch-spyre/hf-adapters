name: cron_test

on:
  schedule:
    # Runs at 06:00 UTC every Monday
    - cron: "0 6 * * 1"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash
    working-directory: /home/senuser

permissions:
  contents: read
  checks: write

env:
  # The CI env var is very important.
  # GitHub actions automatically sets CI=true
  # which causes the pytest inductor tests to fail with AssertionError
  # due to a mix of fallbacks and decompositions.
  # Here we set it to an empty string (or we could also unset it).
  CI: ""
  CLONED_HF_ADAPTERS_DIR: ${{ github.workspace }}
  STORAGE_1_DIR: /storage-1/hf-adapaters
  HF_HOME: /storage-1/hf-adapaters/.cache/huggingface
  # Pytest -k filter and xdist worker count for the CPU test job.
  # Edit here to change the model coverage / parallelism of the weekly run.
  CPU_MODELS_FILTER: "qwen3 or granite or granite2b or granite4 or bge_base or bge_m3"
  CPU_XDIST_WORKERS: "2"
  # Set to a non-empty string to pass --run-slow to pytest (weekly runs slow tests).
  RUN_SLOW: "1"

jobs:
  cpu-tests:
    name: CPU tests
    runs-on:
      - x86_64
      - spyre_pf_x0__pvc_1tb_x1
      - linux
      - image_spyre_inference # move to image_torch_spyre once available
    timeout-minutes: 120

    steps:
      - name: Checkout composite actions
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: .github/actions
          sparse-checkout-cone-mode: false

      - uses: ./.github/actions/build-hf-adapters
        with:
          uv_groups: dev test

      - name: Run CPU tests
        run: |
          unset _IBM_AIU_SETUP
          rm -f /tmp/etc/ibm/spyre/topo.json
          source "$HOME/.bashrc"
          source /etc/profile.d/ibm-aiu-setup.sh
          cd "$CLONED_HF_ADAPTERS_DIR"
          uv run pytest -s -vvv ${RUN_SLOW:+--run-slow} \
            -k "$CPU_MODELS_FILTER" \
            -n "$CPU_XDIST_WORKERS" --dist loadgroup --maxfail=0 \
            tests/test_*cpu*.py
          echo "tests done"

  spyre-load-tests:
    name: Spyre load (${{ matrix.model_key }})
    runs-on:
      - x86_64
      - spyre_pf_x1__pvc_1tb_x1
      - linux
      - image_torch_spyre
    timeout-minutes: 120
    strategy:
      matrix:
        model_key:
          - qwen3
          - granite
          - granite2b
          # - granite4
          # - smollm3
          # - llama
          # - phi4
          # - qwen2
          # - mistral
          # - olmo
          # - olmo2
          # - falcon3
          # - deepseek-coder
          # - yi
          # - granite-vision
          # Embedding models (one per adapter)
          # - minilm
          - bge_m3
          # - mpnet
          # - modernbert
          # - qwen3_embed

    steps:
      - name: Checkout composite actions
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: .github/actions
          sparse-checkout-cone-mode: false

      - uses: ./.github/actions/build-hf-adapters
        with:
          uv_groups: dev spyre test

      - name: Run test_load_spyre.py for ${{ matrix.model_key }}
        run: |
          source "$HOME/.bashrc"
          source /etc/profile.d/ibm-aiu-setup.sh
          cd "$CLONED_HF_ADAPTERS_DIR"
          echo "Running test_load_spyre.py for ${{ matrix.model_key }}..."
          uv run python3 tests/test_load_spyre.py "${{ matrix.model_key }}"
          echo "tests done"

