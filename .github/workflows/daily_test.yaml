# =============================================================================
# Daily test workflow
#
# Calls the reusable _test_jobs.yaml workflow with daily-specific configuration.
# The differences from test_pull_request.yaml:
#
#   1. Trigger
#      - PR:    push to main / pull_request / merge_group / workflow_dispatch.
#      - Daily: schedule (06:00 UTC every day) + workflow_dispatch.
#
#   2. No `pre-commit` job
#      Lint runs on PR; re-running it daily would only catch main-branch
#      regressions that PR already gates against.
#
#   3. No `run-spyre-unit-tests` fan-in gate
#      The PR fan-in exists to satisfy a single branch-protection rule.
#      Daily is informational — no merge gate consumes its result.
#
#   4. `models_filter` (CPU `-k`) is broader
#      - PR:    "qwen3 or bge_base"  (one causal LM + one embedding)
#      - Daily: "qwen3 or granite or granite2b or bge_base or bge_m3"
#      The Spyre matrices are identical to PR — this filter only
#      governs the CPU `-k` selection. We intentionally keep CPU narrow on
#      PR for speed and broaden it daily.
#
#   5. CPU step includes slow tests
#      - PR:    `pytest -m "not slow" -k "$MODELS_FILTER"`
#      - Daily: `pytest -k "$MODELS_FILTER"`            (no marker filter)
#      `@pytest.mark.slow` tests are dropped from PR for speed and picked
#      up here.
#
#   6. Includes `spyre-generate-edge-cases-tests`
#      Slow Spyre edge-case suite; not run on PR. Runs daily over the same
#      causal-LM matrix as smoke/token-compare so it isn't a strict subset.
# =============================================================================
name: daily_test

on:
  schedule:
    # Runs at 06:00 UTC every day
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      torch_spyre_ref:
        description: Branch, tag, or SHA of torch-spyre to check out and test
        required: false
        type: string
        default: ""
      rpm_location:
        description: The Artifactory location where to download the RPM from
        required: false
        type: string
        default: ""
      rpm_names:
        description: A space separated list of RPM names to download and install
        required: false
        type: string
        default: ""

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # ===========================================================================
  # Call the reusable workflow that contains all test job definitions
  # ===========================================================================
  run-tests:
    name: run tests
    uses: ./.github/workflows/_test_jobs.yaml
    with:
      # Single source of truth for the set of models exercised by the CPU
      # test matrix's `-k` filter. CPU stays narrow daily (one causal-LM family
      # plus the two BGE embedders) so the slow-test sweep finishes in time;
      # the Spyre matrices below cover every model in tests/model_registry.py.
      # weekly (weekly_test.yaml) takes the broadest CPU sweep.
      models_filter: "qwen3 or granite or granite2b or bge_base or bge_m3"
      # Daily includes `@pytest.mark.slow` tests (no `-m` filter);
      # PR runs with `-m "not slow"` to stay fast.
      pytest_marker_filter: ""
      torch_spyre_ref: ${{ inputs.torch_spyre_ref }}
      rpm_location: ${{ inputs.rpm_location }}
      rpm_names: ${{ inputs.rpm_names }}
      # Daily workflow includes the slow generate-edge-cases suite
      include_generate_edge_cases: true
    secrets: inherit

