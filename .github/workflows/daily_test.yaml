# =============================================================================
# Daily test workflow
#
# Calls the shared reusable workflow (_spyre_tests.yaml) with daily-specific
# inputs. The differences vs. PR, all driven by inputs:
#
#   1. Trigger: schedule (06:00 UTC daily) + workflow_dispatch.
#   2. No `pre-commit` job — lint runs on PR; re-running it daily would only
#      catch main-branch regressions that PR already gates against.
#   3. No `run-spyre-unit-tests` fan-in gate — daily is informational, no
#      merge gate consumes its result.
#   4. `models_filter` is broader: one causal-LM family + the two BGE
#      embedders. Spyre matrices are unchanged (they live in the reusable).
#   5. `pytest_marker` is empty — daily picks up `@pytest.mark.slow` tests
#      that PR drops via `-m "not slow"`.
#   6. `run_generate_edge_cases: true` — turns on the slow Spyre edge-case
#      matrix in the reusable workflow (PR leaves it off). Each (model, case)
#      pair is its own runner cell — the per-case files under
#      tests/spyre/edge_cases/ replaced the size-1 multiprocessing.Pool the
#      old driver used. Expect ~(models × cases) cells on this lane.
# =============================================================================
name: daily_test

on:
  schedule:
    # Runs at 06:00 UTC every day
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      torch_spyre_ref:
        description: Branch, tag, or SHA of torch-spyre to check out and test
        required: false
        type: string
        default: ""
      rpm_location:
        description: The Artifactory location where to download the RPM from
        required: false
        type: string
        default: ""
      rpm_names:
        description: A space separated list of RPM names to download and install
        required: false
        type: string
        default: ""

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write

jobs:
  tests:
    name: tests
    uses: ./.github/workflows/_spyre_tests.yaml
    with:
      # CPU stays narrow daily (one causal-LM family plus the two BGE
      # embedders) so the slow-test sweep finishes in time; the Spyre
      # matrices in the reusable workflow cover every model in
      # tests/model_registry.py. weekly_test.yaml takes the broadest CPU sweep.
      models_filter: "qwen3 or granite or granite2b or bge_base or bge_m3"
      pytest_marker: ""
      run_generate_edge_cases: true
      torch_spyre_ref: ${{ inputs.torch_spyre_ref }}
      rpm_location: ${{ inputs.rpm_location }}
      rpm_names: ${{ inputs.rpm_names }}
    secrets: inherit
