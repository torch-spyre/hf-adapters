# =============================================================================
# Daily test workflow
#
# Mirrors test_pull_request.yaml almost verbatim — same job structure, same
# runners, same composite build action, same step layout, and the same Spyre
# matrices over every key in tests/model_registry.py. The differences, all
# intentional:
#
#   1. Trigger
#      - PR:    push to main / pull_request / merge_group / workflow_dispatch.
#      - Daily: schedule (06:00 UTC every day) + workflow_dispatch.
#
#   2. No `pre-commit` job
#      Lint runs on PR; re-running it daily would only catch main-branch
#      regressions that PR already gates against.
#
#   3. No `run-spyre-unit-tests` fan-in gate
#      The PR fan-in exists to satisfy a single branch-protection rule.
#      Daily is informational — no merge gate consumes its result.
#
#   4. `MODELS_FILTER` (CPU `-k`) is broader
#      - PR:    "qwen3 or bge_base"  (one causal LM + one embedding)
#      - Daily: "qwen3 or granite or granite2b or bge_base or bge_m3"
#      The Spyre matrices below are identical to PR — this filter only
#      governs the CPU `-k` selection. We intentionally keep CPU narrow on
#      PR for speed and broaden it daily.
#
#   5. CPU step includes slow tests
#      - PR:    `pytest -m "not slow" -k "$MODELS_FILTER"`
#      - Daily: `pytest -k "$MODELS_FILTER"`            (no marker filter)
#      `@pytest.mark.slow` tests are dropped from PR for speed and picked
#      up here.
#
#   6. Adds `spyre-generate-edge-cases-tests`
#      Slow Spyre edge-case suite; not run on PR. Runs daily over the same
#      causal-LM matrix as smoke/token-compare so it isn't a strict subset.
# =============================================================================
name: daily_test

on:
  schedule:
    # Runs at 06:00 UTC every day
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      torch_spyre_ref:
        description: Branch, tag, or SHA of torch-spyre to check out and test
        required: false
        type: string
        default: ""
      rpm_location:
        description: The Artifactory location where to download the RPM from
        required: false
        type: string
        default: ""
      rpm_names:
        description: A space separated list of RPM names to download and install
        required: false
        type: string
        default: ""

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash
    working-directory: /home/senuser

permissions:
  contents: read
  checks: write

env:
  # The CI env var is very important.
  # GitHub actions automatically sets CI=true
  # which causes the pytest inductor tests to fail with AssertionError
  # due to a mix of fallbacks and decompositions.
  # Here we set it to an empty string (or we could also unset it).
  CI: ""
  CLONED_HF_ADAPTERS_DIR: ${{ github.workspace }}
  STORAGE_1_DIR: /storage-1/hf-adapters
  HF_HOME: /storage-1/hf-adapters/.cache/huggingface
  # Single source of truth for the set of models exercised by the CPU
  # test matrix's `-k` filter. CPU stays narrow daily (one causal-LM family
  # plus the two BGE embedders) so the slow-test sweep finishes in time;
  # the Spyre matrices below cover every model in tests/model_registry.py.
  # weekly (weekly_test.yaml) takes the broadest CPU sweep.
  MODELS_FILTER: "qwen3 or granite or granite2b or bge_base or bge_m3"

jobs:
  cpu-tests:
    name: CPU tests (${{ matrix.test_file }})
    runs-on:
      - x86_64
      - spyre_pf_x0__pvc_1tb_x1
      - linux
      - image_torch_spyre
    timeout-minutes: 120
    strategy:
      matrix:
        # Daily includes `@pytest.mark.slow` tests (no `-m` filter below);
        # PR runs with `-m "not slow"` to stay fast.
        test_file:
          - test_load_cpu.py
          - test_adapter_cpu_accuracy.py
          - test_embed_cpu_accuracy.py
          - test_generate_edge_cases_cpu.py
          - test_multibatch_generate_cpu.py
          - test_st_backend_cpu.py

    steps:
      - name: Checkout composite actions
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: .github/actions
          sparse-checkout-cone-mode: false

      - uses: ./.github/actions/build-hf-adapters
        with:
          uv_groups: "dev test"
          rpm_names: ${{ inputs.rpm_names }}
          rpm_location: ${{ inputs.rpm_location }}
          output_dir: ${{ inputs.output_dir }}
          torch_spyre_ref: ${{ inputs.torch_spyre_ref }}
          artifactory_user: ${{ secrets.ARTIFACTORY_USER }}
          artifactory_api_key: ${{ secrets.ARTIFACTORY_API_KEY }}
          artifactory_base_url: ${{ secrets.ARTIFACTORY_BASE_URL }}
          artifactory_rpm_path: ${{ secrets.ARTIFACTORY_RPM_PATH }}

      - name: Run ${{ matrix.test_file }}
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          unset _IBM_AIU_SETUP
          rm -f /tmp/etc/ibm/spyre/topo.json
          source "$HOME/.bashrc"
          source /etc/profile.d/ibm-aiu-setup.sh
          cd "$CLONED_HF_ADAPTERS_DIR"
          echo "Running ${{ matrix.test_file }}..."
          uv run pytest -s -vvv -k "$MODELS_FILTER" "tests/${{ matrix.test_file }}"
          echo "tests done"

  spyre-load-tests:
    name: Spyre load (${{ matrix.model_key }})
    runs-on:
      - x86_64
      - spyre_pf_x1__pvc_1tb_x1
      - linux
      - image_torch_spyre
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        # All causal-LM and embedding keys from tests/model_registry.py.
        # Mirrors the PR workflow's load matrix; commented-out entries are
        # valid registry keys we deliberately exclude — each comment names
        # the reason.
        model_key:
          # Causal LM
          - qwen3
          - granite
          - granite2b
          - granite4
          - smollm3
          - tiny_llama
          # phi4 — partial_rotary_factor=0.75 needs a compiler fix (see CLAUDE.md);
          #        load path itself works, but excluded for parity with the rest of the Spyre matrices.
          # - phi4
          - qwen2
          - ministral
          - olmo
          - olmo2
          - falcon3
          - deepseek-coder
          - granite-vision
          # gemma4 — no public checkpoint at google/gemma-4-12B-it yet; the registry
          #          path 404s on HF so the load test cannot pull weights.
          # - gemma4
          # Embedding
          - qwen3_embed
          - qwen2_embed
          - e5_mistral
          - linq_embed_mistral
          - sfr_embedding_mistral
          - bge_base
          - minilm
          - bge_m3
          - mpnet
          - modernbert
          - gte_modernbert
          - granite_embed

    steps:
      - name: Checkout composite actions
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: .github/actions
          sparse-checkout-cone-mode: false

      - uses: ./.github/actions/build-hf-adapters
        with:
          uv_groups: "dev spyre test"
          rpm_names: ${{ inputs.rpm_names }}
          rpm_location: ${{ inputs.rpm_location }}
          output_dir: ${{ inputs.output_dir }}
          torch_spyre_ref: ${{ inputs.torch_spyre_ref }}
          artifactory_user: ${{ secrets.ARTIFACTORY_USER }}
          artifactory_api_key: ${{ secrets.ARTIFACTORY_API_KEY }}
          artifactory_base_url: ${{ secrets.ARTIFACTORY_BASE_URL }}
          artifactory_rpm_path: ${{ secrets.ARTIFACTORY_RPM_PATH }}

      - name: Run test_load_spyre.py for ${{ matrix.model_key }}
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          source "$HOME/.bashrc"
          source /etc/profile.d/ibm-aiu-setup.sh
          cd "$CLONED_HF_ADAPTERS_DIR"
          echo "Running test_load_spyre.py for ${{ matrix.model_key }}..."
          uv run python3 tests/test_load_spyre.py "${{ matrix.model_key }}"
          echo "tests done"

  spyre-smoke-tests:
    name: Spyre smoke (${{ matrix.model_key }})
    runs-on:
      - x86_64
      - spyre_pf_x1__pvc_1tb_x1
      - linux
      - image_torch_spyre
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        # All causal-LM keys from tests/model_registry.py::CAUSAL_LM_MODELS.
        # Mirrors the PR workflow's smoke matrix.
        model_key:
          - qwen3
          - granite
          - granite2b
          - granite4
          - smollm3
          - tiny_llama
          # phi4 — partial_rotary_factor=0.75 needs a compiler fix (see CLAUDE.md).
          # - phi4
          - qwen2
          - ministral
          - olmo
          - olmo2
          - falcon3
          - deepseek-coder
          # granite-vision — multimodal; load_fn=True in the registry. The smoke
          #                   driver calls AutoSpyreModelForCausalLM.from_pretrained
          #                   directly and does not handle the custom loader.
          # - granite-vision
          # gemma4 — no public checkpoint at google/gemma-4-12B-it (HF 404).
          # - gemma4

    steps:
      - name: Checkout composite actions
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: .github/actions
          sparse-checkout-cone-mode: false

      - uses: ./.github/actions/build-hf-adapters
        with:
          uv_groups: "dev spyre test"
          rpm_names: ${{ inputs.rpm_names }}
          rpm_location: ${{ inputs.rpm_location }}
          output_dir: ${{ inputs.output_dir }}
          torch_spyre_ref: ${{ inputs.torch_spyre_ref }}
          artifactory_user: ${{ secrets.ARTIFACTORY_USER }}
          artifactory_api_key: ${{ secrets.ARTIFACTORY_API_KEY }}
          artifactory_base_url: ${{ secrets.ARTIFACTORY_BASE_URL }}
          artifactory_rpm_path: ${{ secrets.ARTIFACTORY_RPM_PATH }}

      - name: Run test_e2e_smoke_spyre.py for ${{ matrix.model_key }}
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          source "$HOME/.bashrc"
          source /etc/profile.d/ibm-aiu-setup.sh
          cd "$CLONED_HF_ADAPTERS_DIR"
          echo "Running test_e2e_smoke_spyre.py for ${{ matrix.model_key }}..."
          uv run python3 tests/test_e2e_smoke_spyre.py "${{ matrix.model_key }}"
          echo "tests done"

  spyre-token-compare-tests:
    name: Spyre token compare (${{ matrix.model_key }})
    runs-on:
      - x86_64
      - spyre_pf_x1__pvc_1tb_x1
      - linux
      - image_torch_spyre
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        # All causal-LM keys from tests/model_registry.py::CAUSAL_LM_MODELS.
        # Mirrors the PR workflow's token-compare matrix.
        model_key:
          - qwen3
          - granite
          - granite2b
          - granite4
          - smollm3
          - tiny_llama
          # phi4 — partial_rotary_factor=0.75 needs a compiler fix (see CLAUDE.md).
          # - phi4
          - qwen2
          - ministral
          - olmo
          - olmo2
          - falcon3
          - deepseek-coder
          # granite-vision — multimodal; the token-compare driver calls
          #                   AutoSpyreModelForCausalLM.from_pretrained and does
          #                   not handle the custom loader (load_fn=True).
          # - granite-vision
          # gemma4 — no public checkpoint at google/gemma-4-12B-it (HF 404).
          # - gemma4

    steps:
      - name: Checkout composite actions
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: .github/actions
          sparse-checkout-cone-mode: false

      - uses: ./.github/actions/build-hf-adapters
        with:
          uv_groups: "dev spyre test"
          rpm_names: ${{ inputs.rpm_names }}
          rpm_location: ${{ inputs.rpm_location }}
          output_dir: ${{ inputs.output_dir }}
          torch_spyre_ref: ${{ inputs.torch_spyre_ref }}
          artifactory_user: ${{ secrets.ARTIFACTORY_USER }}
          artifactory_api_key: ${{ secrets.ARTIFACTORY_API_KEY }}
          artifactory_base_url: ${{ secrets.ARTIFACTORY_BASE_URL }}
          artifactory_rpm_path: ${{ secrets.ARTIFACTORY_RPM_PATH }}

      - name: Run test_e2e_token_compare_spyre.py for ${{ matrix.model_key }}
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          source "$HOME/.bashrc"
          source /etc/profile.d/ibm-aiu-setup.sh
          cd "$CLONED_HF_ADAPTERS_DIR"
          echo "Running test_e2e_token_compare_spyre.py for ${{ matrix.model_key }}..."
          uv run python3 tests/test_e2e_token_compare_spyre.py "${{ matrix.model_key }}"
          echo "tests done"

  spyre-embed-compare-tests:
    name: Spyre embed compare (${{ matrix.model_key }})
    runs-on:
      - x86_64
      - spyre_pf_x1__pvc_1tb_x1
      - linux
      - image_torch_spyre
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        # All embedding keys from tests/model_registry.py::EMBEDDING_MODELS.
        # Mirrors the PR workflow's embed-compare matrix.
        model_key:
          - qwen3_embed
          - qwen2_embed
          - e5_mistral
          - linq_embed_mistral
          - sfr_embedding_mistral
          - bge_base
          - minilm
          - bge_m3
          - mpnet
          - modernbert
          - gte_modernbert
          - granite_embed

    steps:
      - name: Checkout composite actions
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: .github/actions
          sparse-checkout-cone-mode: false

      - uses: ./.github/actions/build-hf-adapters
        with:
          uv_groups: "dev spyre test"
          rpm_names: ${{ inputs.rpm_names }}
          rpm_location: ${{ inputs.rpm_location }}
          output_dir: ${{ inputs.output_dir }}
          torch_spyre_ref: ${{ inputs.torch_spyre_ref }}
          artifactory_user: ${{ secrets.ARTIFACTORY_USER }}
          artifactory_api_key: ${{ secrets.ARTIFACTORY_API_KEY }}
          artifactory_base_url: ${{ secrets.ARTIFACTORY_BASE_URL }}
          artifactory_rpm_path: ${{ secrets.ARTIFACTORY_RPM_PATH }}

      - name: Run test_e2e_embed_compare_spyre.py for ${{ matrix.model_key }}
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          source "$HOME/.bashrc"
          source /etc/profile.d/ibm-aiu-setup.sh
          cd "$CLONED_HF_ADAPTERS_DIR"
          echo "Running test_e2e_embed_compare_spyre.py for ${{ matrix.model_key }}..."
          uv run python3 tests/test_e2e_embed_compare_spyre.py "${{ matrix.model_key }}"
          echo "tests done"

  spyre-block-compare-tests:
    name: Spyre block compare (${{ matrix.model_key }})
    runs-on:
      - x86_64
      - spyre_pf_x1__pvc_1tb_x1
      - linux
      - image_torch_spyre
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        # Block-compare uses tests/test_block_cpu_vs_spyre.py, which has its own
        # architecture-keyed registry (one entry per adapter family, not per
        # checkpoint). Mirrors the PR workflow's block-compare matrix — every
        # key from tests/model_registry.py routed to its architecture key,
        # with same-family duplicates and unsupported families commented out.
        model_key:
          - qwen3
          - granite
          # granite2b — same adapter (hf_granite) as `granite`; block-compare
          #             registry keys are architecture-level.
          # - granite2b
          - granite4
          - smollm3
          # tiny_llama, falcon3, deepseek-coder all use hf_llama — covered by
          # the `llama` architecture key in the block-compare registry.
          - llama
          # - tiny_llama
          # - falcon3
          # - deepseek-coder
          # phi4 — uses hf_phi3, which is not in the block-compare registry; also
          #        partial_rotary_factor=0.75 needs a compiler fix (see CLAUDE.md).
          # - phi4
          - qwen2
          # ministral uses hf_mistral — covered by the `mistral` architecture key.
          - mistral
          # - ministral
          - olmo
          - olmo2
          - granite-vision
          # gemma4 — uses hf_gemma4, which is not in the block-compare registry,
          #          and there is no public google/gemma-4-12B-it checkpoint yet.
          # - gemma4
          # Embedding models — block-compare today only covers causal-LM
          # architectures. Embedding adapters (hf_bert, hf_xlm_roberta, hf_mpnet,
          # hf_modernbert) are not in the block-compare registry.
          # - qwen3_embed
          # - qwen2_embed
          # - e5_mistral
          # - linq_embed_mistral
          # - sfr_embedding_mistral
          # - bge_base
          # - minilm
          # - bge_m3
          # - mpnet
          # - modernbert
          # - gte_modernbert
          # - granite_embed

    steps:
      - name: Checkout composite actions
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: .github/actions
          sparse-checkout-cone-mode: false

      - uses: ./.github/actions/build-hf-adapters
        with:
          uv_groups: "dev spyre test"
          rpm_names: ${{ inputs.rpm_names }}
          rpm_location: ${{ inputs.rpm_location }}
          output_dir: ${{ inputs.output_dir }}
          torch_spyre_ref: ${{ inputs.torch_spyre_ref }}
          artifactory_user: ${{ secrets.ARTIFACTORY_USER }}
          artifactory_api_key: ${{ secrets.ARTIFACTORY_API_KEY }}
          artifactory_base_url: ${{ secrets.ARTIFACTORY_BASE_URL }}
          artifactory_rpm_path: ${{ secrets.ARTIFACTORY_RPM_PATH }}

      - name: Run test_block_cpu_vs_spyre.py for ${{ matrix.model_key }}
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          source "$HOME/.bashrc"
          source /etc/profile.d/ibm-aiu-setup.sh
          cd "$CLONED_HF_ADAPTERS_DIR"
          echo "Running test_block_cpu_vs_spyre.py for ${{ matrix.model_key }}..."
          uv run python3 tests/test_block_cpu_vs_spyre.py "${{ matrix.model_key }}"
          echo "tests done"

  spyre-generate-edge-cases-tests:
    name: Spyre generate edge (${{ matrix.model_key }})
    runs-on:
      - x86_64
      - spyre_pf_x1__pvc_1tb_x1
      - linux
      - image_torch_spyre
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        # All causal-LM keys from tests/model_registry.py::CAUSAL_LM_MODELS.
        # Same set as the smoke/token-compare matrices above; the generate
        # edge-case driver also calls AutoSpyreModelForCausalLM.from_pretrained.
        model_key:
          - qwen3
          - granite
          - granite2b
          - granite4
          - smollm3
          - tiny_llama
          # phi4 — partial_rotary_factor=0.75 needs a compiler fix (see CLAUDE.md).
          # - phi4
          - qwen2
          - ministral
          - olmo
          - olmo2
          - falcon3
          - deepseek-coder
          # granite-vision — multimodal; the edge-case driver calls
          #                   AutoSpyreModelForCausalLM.from_pretrained and does
          #                   not handle the custom loader (load_fn=True).
          # - granite-vision
          # gemma4 — no public checkpoint at google/gemma-4-12B-it (HF 404).
          # - gemma4

    steps:
      - name: Checkout composite actions
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: .github/actions
          sparse-checkout-cone-mode: false

      - uses: ./.github/actions/build-hf-adapters
        with:
          uv_groups: "dev spyre test"
          rpm_names: ${{ inputs.rpm_names }}
          rpm_location: ${{ inputs.rpm_location }}
          output_dir: ${{ inputs.output_dir }}
          torch_spyre_ref: ${{ inputs.torch_spyre_ref }}
          artifactory_user: ${{ secrets.ARTIFACTORY_USER }}
          artifactory_api_key: ${{ secrets.ARTIFACTORY_API_KEY }}
          artifactory_base_url: ${{ secrets.ARTIFACTORY_BASE_URL }}
          artifactory_rpm_path: ${{ secrets.ARTIFACTORY_RPM_PATH }}

      - name: Run test_generate_edge_cases_spyre.py for ${{ matrix.model_key }}
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          source "$HOME/.bashrc"
          source /etc/profile.d/ibm-aiu-setup.sh
          cd "$CLONED_HF_ADAPTERS_DIR"
          echo "Running test_generate_edge_cases_spyre.py for ${{ matrix.model_key }}..."
          uv run python3 tests/test_generate_edge_cases_spyre.py "${{ matrix.model_key }}"
          echo "tests done"
