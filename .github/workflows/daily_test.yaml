# =============================================================================
# Daily test workflow
#
# Calls _test_common.yaml with daily-specific parameters. Parameter semantics
# (models_filter, include_slow_tests, include_edge_cases) live with the input
# definitions in _test_common.yaml — see those descriptions for the PR-vs-daily
# contract.
#
# Caller-level differences from test_pull_request.yaml:
#
#   1. Trigger: schedule (06:00 UTC daily) + workflow_dispatch, instead of
#      push/pull_request/merge_group/workflow_dispatch.
#
#   2. No `pre-commit` job. Lint runs on PR; re-running daily would only
#      catch main-branch regressions that PR already gates against.
#
#   3. No `run-spyre-unit-tests` fan-in gate. The PR fan-in exists to satisfy
#      a single branch-protection rule; daily is informational.
# =============================================================================
name: daily_test

on:
  schedule:
    # Runs at 06:00 UTC every day
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      torch_spyre_ref:
        description: Branch, tag, or SHA of torch-spyre to check out and test
        required: false
        type: string
        default: ""
      rpm_location:
        description: The Artifactory location where to download the RPM from
        required: false
        type: string
        default: ""
      rpm_names:
        description: A space separated list of RPM names to download and install
        required: false
        type: string
        default: ""

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  run-tests:
    name: Run common test jobs
    uses: ./.github/workflows/_test_common.yaml
    with:
      models_filter: "qwen3 or granite or granite2b or bge_base or bge_m3"
      include_slow_tests: true
      include_edge_cases: true
      torch_spyre_ref: ${{ inputs.torch_spyre_ref }}
      rpm_location: ${{ inputs.rpm_location }}
      rpm_names: ${{ inputs.rpm_names }}
    secrets: inherit

