  # ===========================================================================
  # Required check gate — fans in all matrix jobs so a single branch
  # protection rule ("tests / run spyre unit tests") passes only when every
  # suite passes.
  # ===========================================================================
  run-spyre-unit-tests:
    name: run spyre unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    needs:
      - generate-matrix
      - spyre-edge-cases-eos-first-of-second-block
      - spyre-edge-cases-eos-first-token
      - spyre-edge-cases-eos-inside-prompt
      - spyre-edge-cases-eos-mid-block
      - spyre-edge-cases-eos-on-last-step
      - spyre-edge-cases-no-eos-runs-full-budget
      - spyre-edge-cases-long-multi-block
      - spyre-edge-cases-prompt-exactly-block
      - spyre-edge-cases-short-block-minus-one
      - spyre-edge-cases-short-cross-block
      - spyre-edge-cases-short-one-token
      - spyre-edge-cases-short-two-blocks-plus
      - spyre-edge-cases-single-token-prompt
      - spyre-edge-cases-mixed-short
      - spyre-edge-cases-mixed-with-single-token
      - spyre-edge-cases-no-pad-token-fallback
      - spyre-edge-cases-sampling-determinism
      - spyre-edge-cases-sampling-top-k-zero
      - spyre-edge-cases-zero-new-tokens
    if: always()
    steps:
      - name: Check all suites passed
        run: |-
          if ${{ contains(needs.generate-matrix.result, 'failure') || contains(needs.generate-matrix.result, 'cancelled') ||
                 contains(needs.spyre-edge-cases-eos-first-of-second-block.result, 'failure') || contains(needs.spyre-edge-cases-eos-first-of-second-block.result, 'cancelled') ||
                 contains(needs.spyre-edge-cases-eos-first-token.result, 'failure') || contains(needs.spyre-edge-cases-eos-first-token.result, 'cancelled') ||
                 contains(needs.spyre-edge-cases-eos-inside-prompt.result, 'failure') || contains(needs.spyre-edge-cases-eos-inside-prompt.result, 'cancelled') ||
                 contains(needs.spyre-edge-cases-eos-mid-block.result, 'failure') || contains(needs.spyre-edge-cases-eos-mid-block.result, 'cancelled') ||
                 contains(needs.spyre-edge-cases-eos-on-last-step.result, 'failure') || contains(needs.spyre-edge-cases-eos-on-last-step.result, 'cancelled') ||
                 contains(needs.spyre-edge-cases-no-eos-runs-full-budget.result, 'failure') || contains(needs.spyre-edge-cases-no-eos-runs-full-budget.result, 'cancelled') ||
                 contains(needs.spyre-edge-cases-long-multi-block.result, 'failure') || contains(needs.spyre-edge-cases-long-multi-block.result, 'cancelled') ||
                 contains(needs.spyre-edge-cases-prompt-exactly-block.result, 'failure') || contains(needs.spyre-edge-cases-prompt-exactly-block.result, 'cancelled') ||
                 contains(needs.spyre-edge-cases-short-block-minus-one.result, 'failure') || contains(needs.spyre-edge-cases-short-block-minus-one.result, 'cancelled') ||
                 contains(needs.spyre-edge-cases-short-cross-block.result, 'failure') || contains(needs.spyre-edge-cases-short-cross-block.result, 'cancelled') ||
                 contains(needs.spyre-edge-cases-short-one-token.result, 'failure') || contains(needs.spyre-edge-cases-short-one-token.result, 'cancelled') ||
                 contains(needs.spyre-edge-cases-short-two-blocks-plus.result, 'failure') || contains(needs.spyre-edge-cases-short-two-blocks-plus.result, 'cancelled') ||
                 contains(needs.spyre-edge-cases-single-token-prompt.result, 'failure') || contains(needs.spyre-edge-cases-single-token-prompt.result, 'cancelled') ||
                 contains(needs.spyre-edge-cases-mixed-short.result, 'failure') || contains(needs.spyre-edge-cases-mixed-short.result, 'cancelled') ||
                 contains(needs.spyre-edge-cases-mixed-with-single-token.result, 'failure') || contains(needs.spyre-edge-cases-mixed-with-single-token.result, 'cancelled') ||
                 contains(needs.spyre-edge-cases-no-pad-token-fallback.result, 'failure') || contains(needs.spyre-edge-cases-no-pad-token-fallback.result, 'cancelled') ||
                 contains(needs.spyre-edge-cases-sampling-determinism.result, 'failure') || contains(needs.spyre-edge-cases-sampling-determinism.result, 'cancelled') ||
                 contains(needs.spyre-edge-cases-sampling-top-k-zero.result, 'failure') || contains(needs.spyre-edge-cases-sampling-top-k-zero.result, 'cancelled') ||
                 contains(needs.spyre-edge-cases-zero-new-tokens.result, 'failure') || contains(needs.spyre-edge-cases-zero-new-tokens.result, 'cancelled') }}; then
            echo "One or more test suites failed."
            exit 1
          fi
          echo "All test suites passed."
