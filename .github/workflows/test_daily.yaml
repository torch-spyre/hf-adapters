name: test_daily

on:
  schedule:
    # Runs at 06:00 UTC every day
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      torch_spyre_ref:
        description: Branch, tag, or SHA of torch-spyre to check out and test
        required: false
        type: string
        default: ""
      rpm_location:
        description: The Artifactory location where to download the RPM from
        required: false
        type: string
        default: ""
      rpm_names:
        description: A space separated list of RPM names to download and install
        required: false
        type: string
        default: ""
      ref:
        description: Branch, tag, or SHA of hf-adapters to check out and test
        required: false
        type: string
        default: ""
      repository:
        description: |
          Full clone URL of the hf-adapters fork to check out (e.g.
          "https://github.com/myuser/hf-adapters.git"); leave empty for the base repo.
          Used by the cross-repo Test-With: flow to test a companion fork/branch.
        required: false
        type: string
        default: ""
      pr_url_hash:
        description: |
          Hash of the full URL of the PR that triggered this run.
          Sent by the internal integration pipeline; unused on push/PR/merge_group.
        required: false
        type: string
        default: ""
      build_torch_spyre:
        description: Accepted for dispatch-contract parity with torch-spyre; unused here.
        required: false
        type: boolean
        default: true
      runner_label:
        description: |
          Per-PR ephemeral runner-set IMAGE label to select for runs-on
          (image_hf_adapters_pr_<component>_<sha12>, e.g.
          image_hf_adapters_pr_flex_8ddcf3e155e9). The per-PR ephemeral flow passes
          that PR's set label so jobs land on the per-PR image (the changed RPM is
          baked in -> no runtime sudo). Empty keeps push/PR/merge_group runs on the
          standing image_torch_spyre set (today's behaviour).
        required: false
        type: string
        default: ""

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash
    working-directory: /home/senuser

permissions:
  contents: read
  checks: write

env:
  # The CI env var is very important.
  # GitHub actions automatically sets CI=true
  # which causes the pytest inductor tests to fail with AssertionError
  # due to a mix of fallbacks and decompositions.
  # Here we set it to an empty string (or we could also unset it).
  CI: ""
  CLONED_HF_ADAPTERS_DIR: ${{ github.workspace }}
  STORAGE_1_DIR: /storage-1/hf-adapters
  HF_HOME: /storage-1/hf-adapters/.cache/huggingface

jobs:
  pre-commit:
    name: pre-commit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run pre-commit
        uses: pre-commit/action@v3.0.1
        with:
          # Skip the local mypy hook — it requires the project venv with
          # torch/transformers installed, which we don't set up in this lint job.
          extra_args: --all-files --hook-stage commit --show-diff-on-failure
        env:
          SKIP: mypy

  # ===========================================================================
  # Dynamic matrix generation
  #
  # This job generates test matrices dynamically from tests/model_registry.py
  # using the select_representative_models() function. This ensures that:
  # 1. The CI automatically tests new adapters added to CONFIG_TO_ADAPTER_MODULE_MAPPING
  # 2. We maintain a single source of truth for model selection
  # 3. Manual exclusions can be specified below (e.g., for temporarily broken models)
  #
  # To exclude models from all test matrices, add them to the --exclude list below.
  # ===========================================================================
  generate-matrix:
    name: Generate test matrices
    runs-on: ubuntu-latest
    outputs:
      causal_matrix: ${{ steps.generate.outputs.causal_matrix }}
      embed_matrix: ${{ steps.generate.outputs.embed_matrix }}
      combined_matrix: ${{ steps.generate.outputs.combined_matrix }}
    defaults:
      run:
        working-directory: .
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install transformers torch

      - name: Generate matrices
        id: generate
        run: |
          # Manually exclude models here by adding them to --exclude
          # Example: python .github/scripts/generate_test_matrix.py --exclude granite-vision phi4

          # We exclude these models - See https://github.com/torch-spyre/hf-adapters/issues/89
          python .github/scripts/generate_test_matrix.py --exclude granite-vision granite4 mistral3 falcon3

  spyre-edge-cases-tests:
    name: Spyre load (${{ matrix.model_key }})
    needs: [generate-matrix]
    runs-on:
      - x86_64
      - spyre_pf_x1__pvc_1tb_x1
      - linux
      - ${{ inputs.runner_label || 'image_torch_spyre' }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        # Dynamic matrix: all causal-LM and embedding models from tests/model_registry.py
        # Generated by select_representative_models() - one model per adapter
        # To exclude models, add them to the --exclude list in the generate-matrix job
        model_key: ${{ fromJSON(needs.generate-matrix.outputs.combined_matrix) }}
        test_file:
          - test_eos_first_of_second_block_spyre.py
          - test_eos_first_token_spyre.py
          - test_eos_inside_prompt_spyre.py
          - test_eos_mid_block_spyre.py
          - test_eos_on_last_step_spyre.py
          - test_long_multi_block_spyre.py
          - test_mixed_short_spyre.py
          - test_mixed_with_single_token_spyre.py
          - test_no_eos_runs_full_budget_spyre.py
          - test_no_pad_token_fallback_spyre.py
          - test_prompt_exactly_block_spyre.py
          - test_sampling_determinism_spyre.py
          - test_sampling_top_k_zero_spyre.py
          - test_short_block_minus_one_spyre.py
          - test_short_cross_block_spyre.py
          - test_short_one_token_spyre.py
          - test_short_two_blocks_plus_spyre.py
          - test_single_token_prompt_spyre.py
          - test_zero_new_tokens_spyre.py

    steps:
      - name: Checkout composite actions
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: .github/actions
          sparse-checkout-cone-mode: false

      - uses: ./.github/actions/build-hf-adapters
        with:
          uv_groups: "dev spyre test"
          rpm_names: ${{ inputs.rpm_names }}
          rpm_location: ${{ inputs.rpm_location }}
          output_dir: ${{ inputs.output_dir }}
          torch_spyre_ref: ${{ inputs.torch_spyre_ref }}
          ref: ${{ inputs.ref }}
          repository: ${{ inputs.repository }}
          artifactory_user: ${{ secrets.ARTIFACTORY_USER }}
          artifactory_api_key: ${{ secrets.ARTIFACTORY_API_KEY }}
          artifactory_base_url: ${{ secrets.ARTIFACTORY_BASE_URL }}
          artifactory_rpm_path: ${{ secrets.ARTIFACTORY_RPM_PATH }}

      - name: Run tests/spyre/edge_cases/${{ matrix.test_file }} for ${{ matrix.model_key }}
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          source "$HOME/.bashrc"
          source /etc/profile.d/ibm-aiu-setup.sh
          cd "$CLONED_HF_ADAPTERS_DIR"
          echo "Running tests/spyre/edge_cases/${{ matrix.test_file }} for ${{ matrix.model_key }}..."
          uv run pytest -s -vvv "tests/spyre/edge_cases/${{ matrix.test_file }}" -k "${{ matrix.model_key }}" --run-slow
          echo "tests done"
