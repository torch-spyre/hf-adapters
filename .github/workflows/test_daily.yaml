  spyre-load-tests:
    name: Spyre load (${{ matrix.model_key }})
    runs-on:
      - x86_64
      - spyre_pf_x1__pvc_1tb_x1
      - linux
      - ${{ inputs.runner_label || 'image_torch_spyre' }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        # All causal-LM and embedding keys from tests/model_registry.py.
        # Commented-out entries are valid registry keys we deliberately exclude
        # from PR runs — each comment names the reason.
        model_key:
          # Causal LM
          - qwen3
          - granite8b
          - granite2b
          - granite4
          - smollm3
          - tiny_llama
          - qwen2
          - ministral
          - olmo1b
          - olmo2_1b
          - granite-vision
          # Embedding
          - qwen3_embed
          - qwen2_embed
          - e5_mistral
          - linq_embed_mistral
          - sfr_embedding_mistral
          - bge_base
          - minilm
          - bge_m3
          - mpnet
          - modernbert
          - gte_modernbert
          - granite_embed

    steps:
      - name: Checkout composite actions
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: .github/actions
          sparse-checkout-cone-mode: false

      - uses: ./.github/actions/build-hf-adapters
        with:
          uv_groups: "dev spyre test"
          rpm_names: ${{ inputs.rpm_names }}
          rpm_location: ${{ inputs.rpm_location }}
          output_dir: ${{ inputs.output_dir }}
          torch_spyre_ref: ${{ inputs.torch_spyre_ref }}
          ref: ${{ inputs.ref }}
          repository: ${{ inputs.repository }}
          artifactory_user: ${{ secrets.ARTIFACTORY_USER }}
          artifactory_api_key: ${{ secrets.ARTIFACTORY_API_KEY }}
          artifactory_base_url: ${{ secrets.ARTIFACTORY_BASE_URL }}
          artifactory_rpm_path: ${{ secrets.ARTIFACTORY_RPM_PATH }}

      - name: Run test_load_spyre.py for ${{ matrix.model_key }}
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          source "$HOME/.bashrc"
          source /etc/profile.d/ibm-aiu-setup.sh
          cd "$CLONED_HF_ADAPTERS_DIR"
          echo "Running test_load_spyre.py for ${{ matrix.model_key }}..."
          uv run pytest -s -vvv tests/spyre/test_load_spyre.py -k "${{ matrix.model_key }}" --run-slow
          echo "tests done"

  spyre-smoke-tests:
    name: Spyre smoke (${{ matrix.model_key }})
    runs-on:
      - x86_64
      - spyre_pf_x1__pvc_1tb_x1
      - linux
      - ${{ inputs.runner_label || 'image_torch_spyre' }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        # All causal-LM keys from tests/model_registry.py::CAUSAL_LM_MODELS.
        model_key:
          - qwen3
          - granite8b
          - granite2b

          - smollm3
          - tiny_llama
          - qwen2
          - ministral
          - olmo1b
          - olmo2_1b

    steps:
      - name: Checkout composite actions
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: .github/actions
          sparse-checkout-cone-mode: false

      - uses: ./.github/actions/build-hf-adapters
        with:
          uv_groups: "dev spyre test"
          rpm_names: ${{ inputs.rpm_names }}
          rpm_location: ${{ inputs.rpm_location }}
          output_dir: ${{ inputs.output_dir }}
          torch_spyre_ref: ${{ inputs.torch_spyre_ref }}
          ref: ${{ inputs.ref }}
          repository: ${{ inputs.repository }}
          artifactory_user: ${{ secrets.ARTIFACTORY_USER }}
          artifactory_api_key: ${{ secrets.ARTIFACTORY_API_KEY }}
          artifactory_base_url: ${{ secrets.ARTIFACTORY_BASE_URL }}
          artifactory_rpm_path: ${{ secrets.ARTIFACTORY_RPM_PATH }}

      - name: Run test_e2e_smoke_spyre.py for ${{ matrix.model_key }}
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          source "$HOME/.bashrc"
          source /etc/profile.d/ibm-aiu-setup.sh
          cd "$CLONED_HF_ADAPTERS_DIR"
          echo "Running test_e2e_smoke_spyre.py for ${{ matrix.model_key }}..."
          uv run pytest -s -vvv tests/spyre/test_e2e_smoke_spyre.py -k "${{ matrix.model_key }}" --run-slow
          echo "tests done"

  spyre-token-compare-tests:
    name: Spyre token compare (${{ matrix.model_key }})
    runs-on:
      - x86_64
      - spyre_pf_x1__pvc_1tb_x1
      - linux
      - ${{ inputs.runner_label || 'image_torch_spyre' }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        # All causal-LM keys from tests/model_registry.py::CAUSAL_LM_MODELS.
        model_key:
          - qwen3
          - granite8b
          - granite2b
          - smollm3
          - tiny_llama
          - qwen2
          - ministral
          - olmo1b
          - olmo2_1b

    steps:
      - name: Checkout composite actions
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: .github/actions
          sparse-checkout-cone-mode: false

      - uses: ./.github/actions/build-hf-adapters
        with:
          uv_groups: "dev spyre test"
          rpm_names: ${{ inputs.rpm_names }}
          rpm_location: ${{ inputs.rpm_location }}
          output_dir: ${{ inputs.output_dir }}
          torch_spyre_ref: ${{ inputs.torch_spyre_ref }}
          ref: ${{ inputs.ref }}
          repository: ${{ inputs.repository }}
          artifactory_user: ${{ secrets.ARTIFACTORY_USER }}
          artifactory_api_key: ${{ secrets.ARTIFACTORY_API_KEY }}
          artifactory_base_url: ${{ secrets.ARTIFACTORY_BASE_URL }}
          artifactory_rpm_path: ${{ secrets.ARTIFACTORY_RPM_PATH }}

      - name: Run test_e2e_token_compare_spyre.py for ${{ matrix.model_key }}
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          source "$HOME/.bashrc"
          source /etc/profile.d/ibm-aiu-setup.sh
          cd "$CLONED_HF_ADAPTERS_DIR"
          echo "Running test_e2e_token_compare_spyre.py for ${{ matrix.model_key }}..."
          uv run pytest -s -vvv tests/spyre/test_e2e_token_compare_spyre.py -k "${{ matrix.model_key }}" --run-slow
          echo "tests done"

  spyre-embed-compare-tests:
    name: Spyre embed compare (${{ matrix.model_key }})
    runs-on:
      - x86_64
      - spyre_pf_x1__pvc_1tb_x1
      - linux
      - ${{ inputs.runner_label || 'image_torch_spyre' }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        # All embedding keys from tests/model_registry.py::EMBEDDING_MODELS.
        model_key:
          - qwen3_embed
          - qwen2_embed
          - e5_mistral
          - linq_embed_mistral
          - sfr_embedding_mistral
          - bge_base
          - minilm
          - bge_m3
          - mpnet
          - modernbert
          - gte_modernbert
          - granite_embed

    steps:
      - name: Checkout composite actions
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: .github/actions
          sparse-checkout-cone-mode: false

      - uses: ./.github/actions/build-hf-adapters
        with:
          uv_groups: "dev spyre test"
          rpm_names: ${{ inputs.rpm_names }}
          rpm_location: ${{ inputs.rpm_location }}
          output_dir: ${{ inputs.output_dir }}
          torch_spyre_ref: ${{ inputs.torch_spyre_ref }}
          ref: ${{ inputs.ref }}
          repository: ${{ inputs.repository }}
          artifactory_user: ${{ secrets.ARTIFACTORY_USER }}
          artifactory_api_key: ${{ secrets.ARTIFACTORY_API_KEY }}
          artifactory_base_url: ${{ secrets.ARTIFACTORY_BASE_URL }}
          artifactory_rpm_path: ${{ secrets.ARTIFACTORY_RPM_PATH }}

      - name: Run test_e2e_embed_compare_spyre.py for ${{ matrix.model_key }}
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          source "$HOME/.bashrc"
          source /etc/profile.d/ibm-aiu-setup.sh
          cd "$CLONED_HF_ADAPTERS_DIR"
          echo "Running test_e2e_embed_compare_spyre.py for ${{ matrix.model_key }}..."
          uv run pytest -s -vvv tests/spyre/test_e2e_embed_compare_spyre.py -k "${{ matrix.model_key }}" --run-slow
          echo "tests done"

  # ===========================================================================
  # Required check gate — fans in all matrix jobs so a single branch
  # protection rule ("tests / run spyre unit tests") passes only when every
  # suite passes.
  # ===========================================================================
  run-spyre-unit-tests:
    name: run spyre unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    needs:
      - pre-commit
#      - cpu-tests
      - spyre-load-tests
      - spyre-smoke-tests
      - spyre-token-compare-tests
      - spyre-embed-compare-tests
#      - spyre-block-compare-tests
    if: always()
    steps:
      - name: Check all suites passed
        # NOTE: the `cpu-tests` predicates are
        # intentionally omitted from the `if` below while those jobs are
        # commented out. Re-add the corresponding
        #   contains(needs.<job>.result, 'failure') || contains(needs.<job>.result, 'cancelled') ||
        # lines when restoring either job.
        run: |-
          if ${{ contains(needs.pre-commit.result, 'failure') || contains(needs.pre-commit.result, 'cancelled') ||
                 contains(needs.spyre-load-tests.result, 'failure') || contains(needs.spyre-load-tests.result, 'cancelled') ||
                 contains(needs.spyre-smoke-tests.result, 'failure') || contains(needs.spyre-smoke-tests.result, 'cancelled') ||
                 contains(needs.spyre-token-compare-tests.result, 'failure') || contains(needs.spyre-token-compare-tests.result, 'cancelled') ||
                 contains(needs.spyre-embed-compare-tests.result, 'failure') || contains(needs.spyre-embed-compare-tests.result, 'cancelled') }}; then
            echo "One or more test suites failed."
            exit 1
          fi
          echo "All test suites passed."
