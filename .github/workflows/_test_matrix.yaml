name: Test matrix (reusable)

# ---------------------------------------------------------------------------
# Reusable workflow — not triggered directly.
# Called by test_pull_request.yaml and integration-tests.yaml.
#
# All differences between callers are expressed as inputs:
#   - image_label       : scaleSet selector, last label in every runs-on
#                         (image_torch_spyre_pinned normally; ephemeral label per-PR)
#   - extra_test_flags  : e.g. "-vvv -s"
#   - ref / repository  : forwarded from workflow_dispatch inputs
# ---------------------------------------------------------------------------
on:
  workflow_call:
    inputs:
      # IMAGE selector label — the LAST entry of every job's `runs-on`, alongside
      # the fixed labels [x86_64, spyre_pf_x1, linux]. This is what pins jobs to a
      # single homogeneous scaleSet. Normal runs use the standing set (default
      # below); the per-PR ephemeral flow passes that PR's set label
      # (image_torch_spyre_pinned_pr_<component>_<sha12>) so jobs land on the per-PR image
      # (the RPM is baked in -> no runtime sudo). Both callers send image_torch_spyre_pinned
      # (or the ephemeral label); the default below matches, and only applies if a
      # caller omits image_label entirely. Must be a label in .github/actionlint.yaml.
      image_label:
        description: Image scaleSetLabel to select (image_torch_spyre | image_torch_spyre_pinned | image_torch_spyre_pr_<KEY>)
        required: false
        type: string
        default: image_torch_spyre_pinned

      # pytest CLI flags for the single-card (spyre_pf_x1) test jobs. Passed
      # verbatim to every `pytest ...` call (and forwarded to pytest by the
      # oot-framework runner for the model-module job). Empty default -> bare
      # pytest. Callers set verbosity/markers here, e.g. "-v" or "-vvv -s".
      # NOTE: do not pass `-m "not xfail"` — the registry's non-blocking models
      # are strict=False xfail (meant to run and report), and combined with the
      # per-job `-k <model>` filter it collects 0 tests -> pytest exit 5 -> fail.
      extra_test_flags:
        description: Extra flags passed to pytest for the single-card (spyre_pf_x1) test jobs (e.g. "-v" or "-vvv -s")
        required: false
        type: string
        default: ''

      # pytest CLI flags for the multi-card (x2/x4) test jobs. Consumed by the
      # spyre-vlm-e2e-tests-x2 job (gemma-4-12B on the 2-card runner). Callers
      # pass "-vvv -s" to match the x1 jobs' verbosity.
      extra_test_flags_multi_spyre:
        description: Extra flags passed to pytest for the multi-card (x2/x4) test jobs (e.g. "-vvv -s")
        required: false
        type: string
        default: ''

      # workflow_dispatch pass-throughs
      ref:
        description: Branch, tag, or SHA to check out
        required: false
        type: string
        default: ''
      repository:
        description: Full clone URL of the fork to check out (e.g. "https://github.example.com/myuser/torch-spyre.git"); leave empty for the base repo
        required: false
        type: string
        default: ''
      test_type:
        description: >-
          Which Spyre suites to run. Three coarse tiers cover the common
          cross-repo case (a caller like Jenkins that treats this workflow as
          a blackbox): "smoke" runs only the smoke suite; "core" runs every
          other suite (load, token_compare, embed_compare, vlm,
          model_module); "full" (default) runs everything, i.e. smoke + core.
          For finer control, any other value is a space-separated allowlist
          of individual suite keys matched against each matrix job's own
          `if:` (see the "Suite key" comment above each spyre-*-tests job
          below), e.g. "smoke token_compare". Adding a new suite later means
          giving the new job its own key and adding it to the "core" set --
          no other job needs to change.
        required: false
        type: string
        default: full
      models:
        description: >-
          Space-separated list of model paths to restrict every matrix job
          (smoke/load/token-compare/embed-compare/vision) to, e.g.
          "Qwen/Qwen3-0.6B ministral/Ministral-3B-Instruct". Must match paths
          exactly as they appear in tests/model_registry.py. Empty (default)
          = run every model in the registry.
        required: false
        type: string
        default: ''

defaults:
  run:
    shell: bash
    working-directory: /home/senuser

env:
  # The CI env var is very important.
  # GitHub actions automatically sets CI=true
  # which causes the pytest inductor tests to fail with AssertionError
  # due to a mix of fallbacks and decompositions.
  # Here we set it to an empty string (or we could also unset it).
  CI: ""
  CLONED_HF_ADAPTERS_DIR: ${{ github.workspace }}
  STORAGE_1_DIR: /storage-1/hf-adapters
  HF_HOME: /storage-1/hf-adapters/.cache/huggingface
  # Single source of truth for the set of models exercised by the CPU
  # test matrix's `-k` filter. PR is the fast smoke — qwen3 (causal LM) and
  # bge_base (embedding) on CPU; the same bge_base runs on the Spyre
  # embed-compare matrix below so CPU and hardware embedding coverage stay
  # aligned. Daily and weekly cover the broader model set.
  # Invariant: every model_key used in a Spyre matrix below must have its
  # substring present here so CPU sanity-checks anything that runs on hardware.
  # MODELS_FILTER: "qwen3 or bge_base"

jobs:
  pre-commit:
    name: pre-commit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run pre-commit
        uses: pre-commit/action@v3.0.1
        with:
          # Skip the local mypy hook — it requires the project venv with
          # torch/transformers installed, which we don't set up in this lint job.
          extra_args: --all-files --hook-stage commit --show-diff-on-failure
        env:
          SKIP: mypy

  # ===========================================================================
  # Dynamic matrix generation
  #
  # This job generates test matrices dynamically from tests/model_registry.py
  # using the select_representative_models() function. This ensures that:
  # 1. The CI automatically tests new adapters added to CONFIG_TO_ADAPTER_MODULE_MAPPING
  # 2. We maintain a single source of truth for model selection
  # 3. Manual exclusions can be specified below (e.g., for temporarily broken models)
  #
  # To exclude models from all test matrices, add them to the --exclude list below.
  # ===========================================================================
  generate-matrix:
    name: Generate test matrices
    runs-on: ubuntu-latest
    outputs:
      causal_matrix: ${{ steps.generate.outputs.causal_matrix }}
      embed_matrix: ${{ steps.generate.outputs.embed_matrix }}
      vision_matrix: ${{ steps.generate.outputs.vision_matrix }}
      combined_matrix: ${{ steps.generate.outputs.combined_matrix }}
    defaults:
      run:
        working-directory: .
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install transformers torch pytest

      - name: Generate matrices
        id: generate
        env:
          # Piped through env (not interpolated directly into the script) since
          # this is caller-supplied workflow_call input.
          ONLY_MODELS: ${{ inputs.models }}
        run: |
          # Manually exclude models here by adding them to --exclude
          # Example: python .github/scripts/generate_test_matrix.py --exclude ibm-granite/granite-vision-4.1-4b tiiuae/Falcon3-1B-Base

          # We exclude these models - See https://github.com/torch-spyre/hf-adapters/issues/89
          # google/gemma-4-12B-it: VLM e2e passes on the pod but OOMs the CI runner
          # (see PR #182); validated on-pod, excluded here to match upstream/main.
          ONLY_ARGS=()
          if [[ -n "$ONLY_MODELS" ]]; then
            read -r -a ONLY_ARGS <<< "$ONLY_MODELS"
            ONLY_ARGS=(--only "${ONLY_ARGS[@]}")
          fi
          python .github/scripts/generate_test_matrix.py \
            --exclude tiiuae/Falcon3-1B-Base mistralai/Mistral-Small-3.1-24B-Instruct-2503 google/gemma-4-12B-it \
            "${ONLY_ARGS[@]}"

  adapter-coverage:
    name: adapter coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run adapter coverage test
        run: |
          echo "Checking that all adapter files are registered in model_registry.py..."
          python -m pip install --quiet pytest
          make adapter-coverage-tests PYTEST="python -m pytest" JUNIT_XML=junit-adapter-coverage.xml
          echo "Adapter coverage check passed."

      - name: Upload JUnit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-adapter-coverage
          path: junit-adapter-coverage.xml
          retention-days: 14

  check-uv-lock:
    name: check uv.lock
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python 3.12
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true
          ignore-nothing-to-cache: true
          cache-dependency-glob: |
            pyproject.toml

      - name: Check root uv.lock is up to date
        run: uv lock --check

