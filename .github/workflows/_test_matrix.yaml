  #     - name: Run test_vlm_e2e_spyre.py for ${{ matrix.model_key }}
  #       env:
  #         HF_TOKEN: ${{ secrets.HF_TOKEN }}
  #       run: |
  #         source "$HOME/.bashrc"
  #         source /etc/profile.d/ibm-aiu-setup.sh
  #         cd "$CLONED_HF_ADAPTERS_DIR"
  #         echo "Running test_vlm_e2e_spyre.py for ${{ matrix.model_key }} on x2..."
  #         uv run pytest ${{ inputs.extra_test_flags_multi_spyre }} tests/spyre/test_vlm_e2e_spyre.py -k "${{ matrix.model_key }}"
  #         echo "tests done"

  spyre-model-module-tests:
    name: Spyre model-module tests (${{ matrix.config }})
    # Suite key: "model_module". Part of the "core" coarse tier.
    if: inputs.test_type == 'full' || inputs.test_type == 'core' || contains(format(' {0} ', inputs.test_type), ' model_module ')
    runs-on:
      - x86_64
      - spyre_pf_x1
      - linux
      - ${{ inputs.image_label }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        config:
          - granite_4_1_8b_spyre.yaml
          - granite_3_3_8b_instruct_spyre.yaml
          - Ministral-3-14B-Instruct-2512.yaml
          - Mistral-Small-3.2-24B-Instruct-2506.yaml

    steps:
      - name: Checkout composite actions
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: .github/actions
          sparse-checkout-cone-mode: false

      - uses: ./.github/actions/build-hf-adapters
        with:
          uv_groups: "dev spyre test oot"
          ref: ${{ inputs.ref }}
          repository: ${{ inputs.repository }}

      - name: Gather runner info
        uses: ./.github/actions/gather-runner-info
        with:
          verbose: 'true'

      - name: Run module tests for ${{ matrix.config }}
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          cd "$CLONED_HF_ADAPTERS_DIR"
          source .venv/bin/activate
          make model-module-tests MODULE_CONFIG=${{ matrix.config }} PYTEST_ARGS='${{ inputs.extra_test_flags }}' \
            JUNIT_XML=1 RESULTS_DIR=.
          mv "model-module-${{ matrix.config }}.xml" "junit-model-module-${{ matrix.config }}.xml"

      - name: Upload JUnit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-model-module-${{ matrix.config }}
          path: ${{ env.CLONED_HF_ADAPTERS_DIR }}/junit-model-module-${{ matrix.config }}.xml
          retention-days: 14

  # ===========================================================================
  # Required check gate — fans in all matrix jobs so a single branch
  # protection rule ("tests / run spyre unit tests") passes only when every
  # suite passes.
  # ===========================================================================
  run-spyre-unit-tests:
    name: run spyre unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    needs:
      - pre-commit
      - generate-matrix
      - adapter-coverage
      - check-uv-lock
#      - cpu-tests
      - spyre-load-tests
      - spyre-smoke-tests
      - spyre-token-compare-tests
      - spyre-embed-compare-tests
      - spyre-vlm-e2e-tests
      - spyre-model-module-tests #updated to run model centric HF module tests
    if: always()
    steps:
      - name: Check all suites passed
        # NOTE: the `cpu-tests` predicates are
        # intentionally omitted from the `if` below while those jobs are
        # commented out. Re-add the corresponding
        #   contains(needs.<job>.result, 'failure') || contains(needs.<job>.result, 'cancelled') ||
        # lines when restoring either job.
        run: |-
          if ${{ contains(needs.pre-commit.result, 'failure') || contains(needs.pre-commit.result, 'cancelled') ||
                 contains(needs.generate-matrix.result, 'failure') || contains(needs.generate-matrix.result, 'cancelled') ||
                 contains(needs.adapter-coverage.result, 'failure') || contains(needs.adapter-coverage.result, 'cancelled') ||
                 contains(needs.check-uv-lock.result, 'failure') || contains(needs.check-uv-lock.result, 'cancelled') ||
                 contains(needs.spyre-load-tests.result, 'failure') || contains(needs.spyre-load-tests.result, 'cancelled') ||
                 contains(needs.spyre-smoke-tests.result, 'failure') || contains(needs.spyre-smoke-tests.result, 'cancelled') ||
                 contains(needs.spyre-token-compare-tests.result, 'failure') || contains(needs.spyre-token-compare-tests.result, 'cancelled') ||
                 contains(needs.spyre-embed-compare-tests.result, 'failure') || contains(needs.spyre-embed-compare-tests.result, 'cancelled') ||
                 contains(needs.spyre-vlm-e2e-tests.result, 'failure') || contains(needs.spyre-vlm-e2e-tests.result, 'cancelled') ||
                 contains(needs.spyre-model-module-tests.result, 'failure') || contains(needs.spyre-model-module-tests.result, 'cancelled') }}; then
            echo "One or more test suites failed."
            exit 1
          fi
          echo "All test suites passed."
