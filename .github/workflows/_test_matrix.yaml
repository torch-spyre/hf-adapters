  spyre-load-tests:
    name: Spyre load (${{ matrix.model_key }})
    needs: [generate-matrix]
    # Suite key: "load". Runs on the "full" or "core" coarse tiers (core =
    # every suite except smoke), or when "load" appears as a space-separated
    # word in test_type (e.g. "smoke load") for fine-grained selection.
    # See spyre-smoke-tests for the other keys.
    if: inputs.test_type == 'full' || inputs.test_type == 'core' || contains(format(' {0} ', inputs.test_type), ' load ')
    runs-on:
      - x86_64
      - spyre_pf_x1
      - linux
      - ${{ inputs.image_label }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        # Dynamic matrix: all causal-LM and embedding models from tests/model_registry.py
        # Generated by select_representative_models() - one model per adapter
        # To exclude models, add them to the --exclude list in the generate-matrix job
        model_key: ${{ fromJSON(needs.generate-matrix.outputs.combined_matrix) }}

    steps:
      - name: Checkout composite actions
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: .github/actions
          sparse-checkout-cone-mode: false

      - uses: ./.github/actions/build-hf-adapters
        with:
          uv_groups: "dev spyre test"
          ref: ${{ inputs.ref }}
          repository: ${{ inputs.repository }}

      - name: Gather runner info
        uses: ./.github/actions/gather-runner-info
        with:
          verbose: 'true'

      - name: Run test_load_spyre.py for ${{ matrix.model_key }}
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          source "$HOME/.bashrc"
          source /etc/profile.d/ibm-aiu-setup.sh
          cd "$CLONED_HF_ADAPTERS_DIR"
          echo "Running test_load_spyre.py for ${{ matrix.model_key }}..."
          make load-tests PYTEST_ARGS='${{ inputs.extra_test_flags }}' MODEL_KEY="${{ matrix.model_key }}" JUNIT_XML=junit-load-${{ matrix.model_key }}.xml
          echo "tests done"

      - name: Upload JUnit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-load-${{ replace(matrix.model_key, '/', '-') }}
          path: junit-load-${{ matrix.model_key }}.xml
          retention-days: 14

  spyre-smoke-tests:
    name: Spyre smoke (${{ matrix.model_key }})
    needs: [generate-matrix]
    # Suite key: "smoke", also the coarse "smoke" tier itself (this is the
    # only job that tier runs). Same allowlist mechanism as spyre-load-tests
    # above -- to add a new suite later, give the new job its own key and
    # copy this `if:` line with that key; no existing job needs to change.
    if: inputs.test_type == 'full' || contains(format(' {0} ', inputs.test_type), ' smoke ')
    runs-on:
      - x86_64
      - spyre_pf_x1
      - linux
      - ${{ inputs.image_label }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        # Dynamic matrix: causal-LM models only from tests/model_registry.py
        # Generated by select_representative_models() - one model per adapter
        model_key: ${{ fromJSON(needs.generate-matrix.outputs.causal_matrix) }}

    steps:
      - name: Checkout composite actions
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: .github/actions
          sparse-checkout-cone-mode: false

      - uses: ./.github/actions/build-hf-adapters
        with:
          uv_groups: "dev spyre test"
          ref: ${{ inputs.ref }}
          repository: ${{ inputs.repository }}

      - name: Gather runner info
        uses: ./.github/actions/gather-runner-info
        with:
          verbose: 'true'

      - name: Run test_e2e_smoke_spyre.py for ${{ matrix.model_key }}
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          source "$HOME/.bashrc"
          source /etc/profile.d/ibm-aiu-setup.sh
          cd "$CLONED_HF_ADAPTERS_DIR"
          echo "Running test_e2e_smoke_spyre.py for ${{ matrix.model_key }}..."
          make smoke-tests PYTEST_ARGS='${{ inputs.extra_test_flags }}' MODEL_KEY="${{ matrix.model_key }}" JUNIT_XML=junit-smoke-${{ matrix.model_key }}.xml
          echo "tests done"

      - name: Upload JUnit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-smoke-${{ replace(matrix.model_key, '/', '-') }}
          path: junit-smoke-${{ matrix.model_key }}.xml
          retention-days: 14

  spyre-token-compare-tests:
    name: Spyre token compare (${{ matrix.model_key }})
    needs: [generate-matrix]
    # Suite key: "token_compare". Part of the "core" coarse tier.
    if: inputs.test_type == 'full' || inputs.test_type == 'core' || contains(format(' {0} ', inputs.test_type), ' token_compare ')
    runs-on:
      - x86_64
      - spyre_pf_x1
      - linux
      - ${{ inputs.image_label }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        # Dynamic matrix: causal-LM models only from tests/model_registry.py
        # Generated by select_representative_models() - one model per adapter
        model_key: ${{ fromJSON(needs.generate-matrix.outputs.causal_matrix) }}

    steps:
      - name: Checkout composite actions
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: .github/actions
          sparse-checkout-cone-mode: false

      - uses: ./.github/actions/build-hf-adapters
        with:
          uv_groups: "dev spyre test"
          ref: ${{ inputs.ref }}
          repository: ${{ inputs.repository }}

      - name: Gather runner info
        uses: ./.github/actions/gather-runner-info
        with:
          verbose: 'true'

      - name: Run test_e2e_token_compare_spyre.py for ${{ matrix.model_key }}
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          source "$HOME/.bashrc"
          source /etc/profile.d/ibm-aiu-setup.sh
          cd "$CLONED_HF_ADAPTERS_DIR"
          echo "Running test_e2e_token_compare_spyre.py for ${{ matrix.model_key }}..."
          make token-compare-tests PYTEST_ARGS='${{ inputs.extra_test_flags }}' MODEL_KEY="${{ matrix.model_key }}" JUNIT_XML=junit-token-compare-${{ matrix.model_key }}.xml
          echo "tests done"

      - name: Upload JUnit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-token-compare-${{ replace(matrix.model_key, '/', '-') }}
          path: junit-token-compare-${{ matrix.model_key }}.xml
          retention-days: 14

  spyre-embed-compare-tests:
    name: Spyre embed compare (${{ matrix.model_key }})
    needs: [generate-matrix]
    # Suite key: "embed_compare". Part of the "core" coarse tier.
    if: inputs.test_type == 'full' || inputs.test_type == 'core' || contains(format(' {0} ', inputs.test_type), ' embed_compare ')
    runs-on:
      - x86_64
      - spyre_pf_x1
      - linux
      - ${{ inputs.image_label }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        # Dynamic matrix: embedding models only from tests/model_registry.py
        # Generated by select_representative_models() - one model per adapter
        model_key: ${{ fromJSON(needs.generate-matrix.outputs.embed_matrix) }}

    steps:
      - name: Checkout composite actions
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: .github/actions
          sparse-checkout-cone-mode: false

      - uses: ./.github/actions/build-hf-adapters
        with:
          uv_groups: "dev spyre test"
          ref: ${{ inputs.ref }}
          repository: ${{ inputs.repository }}

      - name: Gather runner info
        uses: ./.github/actions/gather-runner-info
        with:
          verbose: 'true'

      - name: Run test_e2e_embed_compare_spyre.py for ${{ matrix.model_key }}
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          source "$HOME/.bashrc"
          source /etc/profile.d/ibm-aiu-setup.sh
          cd "$CLONED_HF_ADAPTERS_DIR"
          echo "Running test_e2e_embed_compare_spyre.py for ${{ matrix.model_key }}..."
          make embed-compare-tests PYTEST_ARGS='${{ inputs.extra_test_flags }}' MODEL_KEY="${{ matrix.model_key }}" JUNIT_XML=junit-embed-compare-${{ matrix.model_key }}.xml
          echo "tests done"

      - name: Upload JUnit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-embed-compare-${{ replace(matrix.model_key, '/', '-') }}
          path: junit-embed-compare-${{ matrix.model_key }}.xml
          retention-days: 14

  spyre-vlm-e2e-tests:
    name: Spyre VLM e2e (${{ matrix.model_key }})
    needs: [generate-matrix]
    # Suite key: "vlm". Part of the "core" coarse tier.
    if: inputs.test_type == 'full' || inputs.test_type == 'core' || contains(format(' {0} ', inputs.test_type), ' vlm ')
    runs-on:
      - x86_64
      - spyre_pf_x1
      - linux
      - ${{ inputs.image_label }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        # Dynamic matrix: VLM (kind="vlm") models from tests/model_registry.py
        # Generated from VISION_PATHS - one entry per VLM adapter
        # To exclude models, add them to the --exclude list in the generate-matrix job
        model_key: ${{ fromJSON(needs.generate-matrix.outputs.vision_matrix) }}

    steps:
      - name: Checkout composite actions
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: .github/actions
          sparse-checkout-cone-mode: false

      - uses: ./.github/actions/build-hf-adapters
        with:
          uv_groups: "dev spyre test"
          ref: ${{ inputs.ref }}
          repository: ${{ inputs.repository }}

      - name: Gather runner info
        uses: ./.github/actions/gather-runner-info
        with:
          verbose: 'true'

      - name: Run test_vlm_e2e_spyre.py for ${{ matrix.model_key }}
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          source "$HOME/.bashrc"
          source /etc/profile.d/ibm-aiu-setup.sh
          cd "$CLONED_HF_ADAPTERS_DIR"
          echo "Running test_vlm_e2e_spyre.py for ${{ matrix.model_key }}..."
          make vlm-tests PYTEST_ARGS='${{ inputs.extra_test_flags }}' MODEL_KEY="${{ matrix.model_key }}" JUNIT_XML=junit-vlm-${{ matrix.model_key }}.xml
          echo "tests done"

      - name: Upload JUnit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-vlm-${{ replace(matrix.model_key, '/', '-') }}
          path: junit-vlm-${{ matrix.model_key }}.xml
          retention-days: 14

