name: test_each_commit

on:
  push:
    branches: [main]
    tags: ["*"]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  merge_group:
    types: [checks_requested]
  workflow_dispatch:
    inputs:
      torch_spyre_ref:
        description: Branch, tag, or SHA of torch-spyre to check out and test
        required: false
        type: string
        default: ""
      rpm_location:
        description: The Artifactory location where to download the RPM from
        required: false
        type: string
        default: ""
      rpm_names:
        description: A space separated list of RPM names to download and install
        required: false
        type: string
        default: ""

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash
    working-directory: /home/senuser

permissions:
  contents: read
  checks: write

env:
  # The CI env var is very important.
  # GitHub actions automatically sets CI=true
  # which causes the pytest inductor tests to fail with AssertionError
  # due to a mix of fallbacks and decompositions.
  # Here we set it to an empty string (or we could also unset it).
  CI: ""
  CLONED_HF_ADAPTERS_DIR: ${{ github.workspace }}
  STORAGE_1_DIR: /storage-1/hf-adapaters
  HF_HOME: /storage-1/hf-adapaters/.cache/huggingface

jobs:
  cpu-tests:
    name: CPU tests (${{ matrix.test_file }})
    runs-on:
      - x86_64
      - spyre_pf_x0__pvc_1tb_x1
      - linux
      - image_spyre_inference # move to image_torch_spyre once available
    timeout-minutes: 120
    strategy:
      matrix:
        test_file:
          - test_load_cpu.py
          - test_adapter_cpu_accuracy.py
          - test_embed_cpu_accuracy.py
          # test_generate_edge_cases_cpu.py moved to weekly workflow
          - test_multibatch_generate.py
          - test_st_backend_cpu.py

    steps:
      - name: Checkout composite actions
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: .github/actions
          sparse-checkout-cone-mode: false

      - uses: ./.github/actions/build-hf-adapters
        with:
          uv_groups: "dev test"
          rpm_names: ${{ inputs.rpm_names }}
          rpm_location: ${{ inputs.rpm_location }}
          output_dir: ${{ inputs.output_dir }}
          torch_spyre_ref: ${{ inputs.torch_spyre_ref }}
          artifactory_user: ${{ secrets.ARTIFACTORY_USER }}
          artifactory_api_key: ${{ secrets.ARTIFACTORY_API_KEY }}
          artifactory_base_url: ${{ secrets.ARTIFACTORY_BASE_URL }}
          artifactory_rpm_path: ${{ secrets.ARTIFACTORY_RPM_PATH }}

      - name: Run ${{ matrix.test_file }}
        run: |
          unset _IBM_AIU_SETUP
          rm -f /tmp/etc/ibm/spyre/topo.json
          source "$HOME/.bashrc"
          source /etc/profile.d/ibm-aiu-setup.sh
          cd "$CLONED_HF_ADAPTERS_DIR"
          echo "Running ${{ matrix.test_file }}..."
          uv run pytest -s -vvv -k "qwen3 or granite or granite2b or granite4 or bge_base or bge_m3" "tests/${{ matrix.test_file }}"
          echo "tests done"

  spyre-load-tests:
    name: Spyre load (${{ matrix.model_key }})
    runs-on:
      - x86_64
      - spyre_pf_x1__pvc_1tb_x1
      - linux
      - image_torch_spyre
    timeout-minutes: 120
    strategy:
      matrix:
        model_key:
          - qwen3
          - granite
          - granite2b
          # - granite4
          # - smollm3
          # - llama
          # - phi4
          # - qwen2
          # - mistral
          # - olmo
          # - olmo2
          # - falcon3
          # - deepseek-coder
          # - yi
          # - granite-vision
          # Embedding models (one per adapter)
          # - minilm
          - bge_m3
          # - mpnet
          # - modernbert
          # - qwen3_embed

    steps:
      - name: Checkout composite actions
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: .github/actions
          sparse-checkout-cone-mode: false

      - uses: ./.github/actions/build-hf-adapters
        with:
          uv_groups: "dev spyre test"
          rpm_names: ${{ inputs.rpm_names }}
          rpm_location: ${{ inputs.rpm_location }}
          output_dir: ${{ inputs.output_dir }}
          torch_spyre_ref: ${{ inputs.torch_spyre_ref }}
          artifactory_user: ${{ secrets.ARTIFACTORY_USER }}
          artifactory_api_key: ${{ secrets.ARTIFACTORY_API_KEY }}
          artifactory_base_url: ${{ secrets.ARTIFACTORY_BASE_URL }}
          artifactory_rpm_path: ${{ secrets.ARTIFACTORY_RPM_PATH }}

      - name: Run test_load_spyre.py for ${{ matrix.model_key }}
        run: |
          source "$HOME/.bashrc"
          source /etc/profile.d/ibm-aiu-setup.sh
          cd "$CLONED_HF_ADAPTERS_DIR"
          echo "Running test_load_spyre.py for ${{ matrix.model_key }}..."
          uv run python3 tests/test_load_spyre.py "${{ matrix.model_key }}"
          echo "tests done"

  spyre-smoke-tests:
    name: Spyre smoke (${{ matrix.model_key }})
    runs-on:
      - x86_64
      - spyre_pf_x1__pvc_1tb_x1
      - linux
      - image_torch_spyre
    timeout-minutes: 120
    strategy:
      matrix:
        model_key:
          - qwen3
          - granite
          - granite2b
          - granite4
          # - smollm3
          # - llama
          # - phi4
          # - qwen2
          # - mistral
          # - olmo
          # - olmo2
          # - falcon3
          # - deepseek-coder
          # - yi
          # - granite-vision

    steps:
      - name: Checkout composite actions
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: .github/actions
          sparse-checkout-cone-mode: false

      - uses: ./.github/actions/build-hf-adapters
        with:
          uv_groups: "dev spyre test"
          rpm_names: ${{ inputs.rpm_names }}
          rpm_location: ${{ inputs.rpm_location }}
          output_dir: ${{ inputs.output_dir }}
          torch_spyre_ref: ${{ inputs.torch_spyre_ref }}
          artifactory_user: ${{ secrets.ARTIFACTORY_USER }}
          artifactory_api_key: ${{ secrets.ARTIFACTORY_API_KEY }}
          artifactory_base_url: ${{ secrets.ARTIFACTORY_BASE_URL }}
          artifactory_rpm_path: ${{ secrets.ARTIFACTORY_RPM_PATH }}

      - name: Run test_e2e_smoke_spyre.py for ${{ matrix.model_key }}
        run: |
          source "$HOME/.bashrc"
          source /etc/profile.d/ibm-aiu-setup.sh
          cd "$CLONED_HF_ADAPTERS_DIR"
          echo "Running test_e2e_smoke_spyre.py for ${{ matrix.model_key }}..."
          uv run python3 tests/test_e2e_smoke_spyre.py "${{ matrix.model_key }}"
          echo "tests done"

  spyre-token-compare-tests:
    name: Spyre token compare (${{ matrix.model_key }})
    runs-on:
      - x86_64
      - spyre_pf_x1__pvc_1tb_x1
      - linux
      - image_torch_spyre
    timeout-minutes: 120
    strategy:
      matrix:
        model_key:
          - qwen3
          - granite
          # - llama
          # - qwen2
          # - mistral
          # - olmo
          # - olmo2
          # - falcon3

    steps:
      - name: Checkout composite actions
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: .github/actions
          sparse-checkout-cone-mode: false

      - uses: ./.github/actions/build-hf-adapters
        with:
          uv_groups: "dev spyre test"
          rpm_names: ${{ inputs.rpm_names }}
          rpm_location: ${{ inputs.rpm_location }}
          output_dir: ${{ inputs.output_dir }}
          torch_spyre_ref: ${{ inputs.torch_spyre_ref }}

      - name: Run test_e2e_token_compare_spyre.py for ${{ matrix.model_key }}
        run: |
          source "$HOME/.bashrc"
          source /etc/profile.d/ibm-aiu-setup.sh
          cd "$CLONED_HF_ADAPTERS_DIR"
          echo "Running test_e2e_token_compare_spyre.py for ${{ matrix.model_key }}..."
          uv run python3 tests/test_e2e_token_compare_spyre.py "${{ matrix.model_key }}"
          echo "tests done"

  spyre-embed-compare-tests:
    name: Spyre embed compare (${{ matrix.model_key }})
    runs-on:
      - x86_64
      - spyre_pf_x1__pvc_1tb_x1
      - linux
      - image_torch_spyre
    timeout-minutes: 120
    strategy:
      matrix:
        model_key:
          - bge_base
          # - minilm
          # - qwen3_embed

    steps:
      - name: Checkout composite actions
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: .github/actions
          sparse-checkout-cone-mode: false

      - uses: ./.github/actions/build-hf-adapters
        with:
          uv_groups: "dev spyre test"
          rpm_names: ${{ inputs.rpm_names }}
          rpm_location: ${{ inputs.rpm_location }}
          output_dir: ${{ inputs.output_dir }}
          torch_spyre_ref: ${{ inputs.torch_spyre_ref }}

      - name: Run test_e2e_embed_compare_spyre.py for ${{ matrix.model_key }}
        run: |
          source "$HOME/.bashrc"
          source /etc/profile.d/ibm-aiu-setup.sh
          cd "$CLONED_HF_ADAPTERS_DIR"
          echo "Running test_e2e_embed_compare_spyre.py for ${{ matrix.model_key }}..."
          uv run python3 tests/test_e2e_embed_compare_spyre.py "${{ matrix.model_key }}"
          echo "tests done"

  spyre-block-compare-tests:
    name: Spyre block compare (${{ matrix.model_key }})
    runs-on:
      - x86_64
      - spyre_pf_x1__pvc_1tb_x1
      - linux
      - image_torch_spyre
    timeout-minutes: 120
    strategy:
      matrix:
        model_key:
          - qwen3
          - granite
          # - granite4
          # - smollm3
          # - llama
          # - qwen2
          # - mistral
          # - olmo

    steps:
      - name: Checkout composite actions
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: .github/actions
          sparse-checkout-cone-mode: false

      - uses: ./.github/actions/build-hf-adapters
        with:
          uv_groups: "dev spyre test"
          rpm_names: ${{ inputs.rpm_names }}
          rpm_location: ${{ inputs.rpm_location }}
          output_dir: ${{ inputs.output_dir }}
          torch_spyre_ref: ${{ inputs.torch_spyre_ref }}

      - name: Run test_block_cpu_vs_spyre.py for ${{ matrix.model_key }}
        run: |
          source "$HOME/.bashrc"
          source /etc/profile.d/ibm-aiu-setup.sh
          cd "$CLONED_HF_ADAPTERS_DIR"
          echo "Running test_block_cpu_vs_spyre.py for ${{ matrix.model_key }}..."
          uv run python3 tests/test_block_cpu_vs_spyre.py "${{ matrix.model_key }}"
          echo "tests done"

  # ===========================================================================
  # Required check gate — fans in all matrix jobs so a single branch
  # protection rule ("tests / run spyre unit tests") passes only when every
  # suite passes.
  # ===========================================================================
  run-spyre-unit-tests:
    name: run spyre unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    needs:
      - cpu-tests
      - spyre-load-tests
      - spyre-smoke-tests
      - spyre-token-compare-tests
      - spyre-embed-compare-tests
      - spyre-block-compare-tests
    if: always()
    steps:
      - name: Check all suites passed
        run: |-
          if ${{ contains(needs.cpu-tests.result, 'failure') || contains(needs.cpu-tests.result, 'cancelled') ||
                 contains(needs.spyre-load-tests.result, 'failure') || contains(needs.spyre-load-tests.result, 'cancelled') ||
                 contains(needs.spyre-smoke-tests.result, 'failure') || contains(needs.spyre-smoke-tests.result, 'cancelled') ||
                 contains(needs.spyre-token-compare-tests.result, 'failure') || contains(needs.spyre-token-compare-tests.result, 'cancelled') ||
                 contains(needs.spyre-embed-compare-tests.result, 'failure') || contains(needs.spyre-embed-compare-tests.result, 'cancelled') ||
                 contains(needs.spyre-block-compare-tests.result, 'failure') || contains(needs.spyre-block-compare-tests.result, 'cancelled') }}; then
            echo "One or more test suites failed."
            exit 1
          fi
          echo "All test suites passed."
