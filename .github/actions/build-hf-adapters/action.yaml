name: Build hf-adapters
description: >
  Install hf-adapters and its dependencies using uv.
  The uv_groups input controls which dependency groups are installed.

inputs:
  uv_groups:
    description: >
      Space-separated list of uv groups to install (e.g. "dev test" or "dev spyre test").
    required: true
    type: string
  rpm_names:
    description: A space separated list of RPM names to download and install
    required: true
  rpm_location:
    description: |
      Full Artifactory URL to download RPMs from (e.g.
      https://artifactory.example.com/path/to/rpms). When set, overrides the
      ARTIFACTORY_BASE_URL + ARTIFACTORY_RPM_PATH secrets.
    required: false
    default: ''
  output_dir:
    description: Path to the download the RPMs to
    required: false
    default: rpms
  torch_spyre_ref:
    description: Branch, tag, or SHA of torch-spyre to check out and test
    required: false
    default: ''
  ref:
    description: >
      Branch, tag, or SHA of hf-adapters to check out. Empty = the PR/push head
      (today's behaviour). Set by the cross-repo Test-With: flow to test a companion ref.
    required: false
    default: ''
  repository:
    description: >
      Full clone URL of the hf-adapters fork to check out (e.g.
      https://github.com/myuser/hf-adapters.git). Empty = the base repo
      ($GITHUB_SERVER_URL/$GITHUB_REPOSITORY). Set by the Test-With: flow.
    required: false
    default: ''
  artifactory_user:
    description: Artifactory username
    required: false
    default: ''
  artifactory_api_key:
    description: Artifactory API key
    required: false
    default: ''
  artifactory_base_url:
    description: Artifactory base URL
    required: false
    default: ''
  artifactory_rpm_path:
    description: Artifactory RPM path
    required: false
    default: ''
outputs:
  target_sha:
    description: The resolved commit SHA that was checked out
    value: ${{ steps.resolve-sha.outputs.target_sha }}


runs:
  using: composite
  steps:
    - name: Checkout target commit
      id: resolve-sha
      shell: bash
      working-directory: /home/senuser
      env:
        PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
        GITHUB_SHA: ${{ github.sha }}
        GITHUB_REF: ${{ github.ref }}
        # Cross-repo Test-With: overrides. Empty = today's behaviour (base repo, PR/push head).
        INPUT_REF: ${{ inputs.ref }}
        INPUT_REPOSITORY: ${{ inputs.repository }}
      run: |
        source "$HOME/.bashrc"
        source /etc/profile.d/ibm-aiu-setup.sh
        git config --global --add safe.directory '*'
        rm -fr "$CLONED_HF_ADAPTERS_DIR"
        CLONE_URL="${INPUT_REPOSITORY:-$GITHUB_SERVER_URL/$GITHUB_REPOSITORY.git}"
        if [[ -n "$INPUT_REF" || -n "$INPUT_REPOSITORY" ]]; then
          git clone "$CLONE_URL" "$CLONED_HF_ADAPTERS_DIR"
        else
          git clone --depth=1 "$CLONE_URL" "$CLONED_HF_ADAPTERS_DIR"
        fi
        cd "$CLONED_HF_ADAPTERS_DIR"
        if [[ -n "$INPUT_REF" ]]; then
          # Explicit ref (Test-With: companion fork/branch).
          TARGET_REF="$INPUT_REF"
          echo "TARGET_REF=${TARGET_REF} (from input.ref)"
          git fetch --tags --force origin "+${TARGET_REF}:refs/remotes/origin/_target" || \
            git fetch --tags --force origin
          git checkout --force "${TARGET_REF}" 2>/dev/null || git checkout --force origin/_target
          TARGET_SHA="$(git rev-parse HEAD)"
        else
          TARGET_SHA="${PR_HEAD_SHA:-$GITHUB_SHA}"
          TARGET_REF="${PR_HEAD_REF:-$GITHUB_REF}"
          echo "TARGET_REF=${TARGET_REF}"
          echo "TARGET_SHA=${TARGET_SHA}"
          git fetch --tags --force origin "+${TARGET_SHA}" || \
            git fetch --tags --force origin
          git checkout --force "${TARGET_SHA}"
        fi
        git log -1 --oneline
        echo "target_sha=${TARGET_SHA}" >> "$GITHUB_OUTPUT"

    - name: Gather runner info
      shell: bash
      working-directory: /home/senuser
      run: |
        source "$HOME/.bashrc"
        source /etc/profile.d/ibm-aiu-setup.sh
        date
        pwd
        whoami
        id
        echo "GHA_RUNNER_POD_NODE_NAME $GHA_RUNNER_POD_NODE_NAME"
        echo "PATH $PATH"
        echo "HOME $HOME"
        python3 --version
        python3 -c 'import sys; print(sys.path)'
        echo "--- env ---"
        env | sort
        echo "--- AIU env ---"
        env | sort | grep AIU || true

    - name: Download RPMs
      if: ${{ inputs.rpm_names != '' }}
      shell: bash
      working-directory: /home/senuser
      env:
        ARTIFACTORY_USER: ${{ inputs.artifactory_user }}
        ARTIFACTORY_API_KEY: ${{ inputs.artifactory_api_key }}
        ARTIFACTORY_BASE_URL: ${{ inputs.artifactory_base_url }}
        ARTIFACTORY_RPM_PATH: ${{ inputs.artifactory_rpm_path }}
        ARTIFACTORY_LOCATION: ${{ inputs.rpm_location }}
        DOWNLOAD_SCRIPT: .github/scripts/download_rpms.sh
        RPM_NAMES: ${{ inputs.rpm_names }}
        RPMS_DOWNLOAD_DIR: ${{ inputs.output_dir }}
      run: |
        source "$HOME/.bashrc"
        source /etc/profile.d/ibm-aiu-setup.sh
        cd /home/senuser/torch-spyre
        ls -la "$DOWNLOAD_SCRIPT"
        "$DOWNLOAD_SCRIPT"

    - name: Install RPMs
      if: ${{ inputs.rpm_names != '' }}
      shell: bash
      working-directory: /home/senuser
      run: |
        ls -la
        ls -la rpms/
        sudo dnf install -y rpms/*.rpm

    - name: Build hf-adapters
      shell: bash
      working-directory: /home/senuser
      env:
        UV_GROUPS: "${{ inputs.uv_groups }}"
        INPUT_REF: "${{ inputs.torch_spyre_ref }}"
      run: |
        source "$HOME/.bashrc"
        source /etc/profile.d/ibm-aiu-setup.sh
        git config --global --add safe.directory '*'

        # Build group flags from space-separated list
        GROUP_FLAGS=""
        for group in $UV_GROUPS; do
          GROUP_FLAGS="$GROUP_FLAGS --group $group"
        done

        if [[ -n "$INPUT_REF" ]]; then
          cd /home/senuser/torch-spyre
          TARGET_SHA="$INPUT_REF"
          TARGET_REF="$INPUT_REF"
          echo "TARGET_REF=${TARGET_REF}"
          echo "TARGET_SHA=${TARGET_SHA}"
          git fetch --tags --force origin "+${TARGET_SHA}" || \
            git fetch --tags --force origin
          git checkout --force "${TARGET_SHA}"
          git submodule sync --recursive
          git submodule update --init --recursive --force
          git log -1 --oneline
          cd "$CLONED_HF_ADAPTERS_DIR"
          uv add torch-spyre /home/senuser/torch-spyre
          uv sync --verbose --refresh $GROUP_FLAGS
        else
          cd "$CLONED_HF_ADAPTERS_DIR"
          # though we pin to main
          # frozen installation takes pinned commit when locked
          # we want to relax on torch-spyre to use floating version
          # and have other dependencies locked
          # TODO: uncomment this once torch-spyre latest is stable
          # uv lock --upgrade-package torch-spyre
          uv sync --frozen --verbose --refresh $GROUP_FLAGS
        fi
        uv pip show torch
        uv pip freeze
