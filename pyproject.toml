[project]
name = "hf-adapters-spyre"
version = "0.1.0"
description = "Minimal runtime patches that make stock HuggingFace Transformers models run on Spyre accelerators"
readme = "README.md"
license = { file = "LICENSE.txt" }
requires-python = ">=3.10"
dependencies = [
    "torch>=2.0",
    "transformers",
    "sentencepiece",
]

[project.optional-dependencies]
test = [
    "pytest",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["hf_adapters"]
