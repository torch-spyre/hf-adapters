[project]
name = "hf-adapters-spyre"
version = "0.1.0"
description = "Minimal runtime patches that make stock HuggingFace Transformers models run on Spyre accelerators"
readme = "README.md"
license = { file = "LICENSE.txt" }
requires-python = ">=3.10"
dependencies = [
    "torch>=2.0",
    "transformers",
    "sentencepiece",
    "accelerate",

]

[project.optional-dependencies]
test = [
    "pytest",
]
dev = [
    "pre-commit>=3.5.0",
    "black>=26.3.1",
    "ruff>=0.15.6",
    "mypy>=1.14.0,<2",
    "typing-extensions",
    "nicegui"
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["hf_adapters"]

[tool.black]
line-length = 88
target-version = ['py310', 'py311']
include = '\.pyi?$'

[tool.ruff]
line-length = 88
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W"]
ignore = [
    "E501",  # Line too long
    "N806",  # Variable in function should be lowercase (allow B, H, L, D, etc.)
    "N812",  # Lowercase imported as non-lowercase (allow F for functional)
]

[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false
files = ["hf_adapters/**/*.py"]
